// ─── EXPORT PDF ───────────────────────────────────────────────────────────────
let _jsPDFLoaded=false;
async function loadJsPDF(){
  if(_jsPDFLoaded)return;
  await new Promise((res,rej)=>{
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload=()=>{_jsPDFLoaded=true;res();};s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function exportPDF(piece,displayKey,displayMode,prefs){
  await loadJsPDF();
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const W=210,H=297,mL=14,mR=14,mT=14;
  const usableW=W-mL-mR;   // 182mm
  const CPR=4;              // Mesures par rangée (Chords Per Row)
  const mW=usableW/CPR;     // ~45.5mm par mesure
  const mH=16;              // Hauteur d'une mesure
  let y=mT;

  // ── En-tête ──
  doc.setFont('helvetica','bold');
  doc.setFontSize(18);
  doc.setTextColor(26,26,26);
  doc.text(piece.title||'Sans titre',mL,y+6);
  y+=9;
  if(piece.composer){
    doc.setFont('helvetica','italic');doc.setFontSize(10);
    doc.setTextColor(80,80,80);
    doc.text(piece.composer,mL,y+4);y+=6;
  }
  const key=(displayKey||piece.key||'C')+(displayMode==='min'?'m':'');
  const metaStr=[`Ton. ${key}`,`${piece.bpm||120} BPM`,piece.timeSig||'4/4',piece.style||''].filter(Boolean).join('  ·  ');
  doc.setFont('helvetica','normal');doc.setFontSize(8);doc.setTextColor(120,120,120);
  doc.text(metaStr,mL,y+3.5);y+=6;
  doc.setDrawColor(180,180,180);doc.setLineWidth(0.25);
  doc.line(mL,y,W-mR,y);y+=5;

  // ── Sections ──
  const gridSections=(piece.sections||[]).filter(s=>s.type==='grid'||!s.type);
  for(const section of gridSections){
    const measures=section.measures||[];
    if(!measures.length)continue;

    // Nom de section
    if(section.name){
      if(y+mH+10>H-mT){doc.addPage();y=mT;}
      doc.setFont('helvetica','bold');doc.setFontSize(7.5);
      doc.setTextColor(100,100,100);
      doc.text((section.name).toUpperCase(),mL,y+2.5);
      y+=5;
    }

    // Rangées de mesures
    const nRows=Math.ceil(measures.length/CPR);
    for(let row=0;row<nRows;row++){
      if(y+mH+2>H-mT){doc.addPage();y=mT;}
      const rowMM=measures.slice(row*CPR,(row+1)*CPR);
      const x0=mL;const rowY=y;

      // Ligne du haut et du bas
      doc.setDrawColor(50,50,50);doc.setLineWidth(0.2);
      doc.line(x0,rowY,x0+rowMM.length*mW,rowY);
      doc.line(x0,rowY+mH,x0+rowMM.length*mW,rowY+mH);

      for(let mi=0;mi<rowMM.length;mi++){
        const mm=rowMM[mi];
        const mx=x0+mi*mW;
        // Barline gauche
        doc.setDrawColor(50,50,50);
        doc.setLineWidth(mi===0?0.5:0.2);
        doc.line(mx,rowY,mx,rowY+mH);

        // Chords
        const beats=getBeats(mm);
        const active=beats.map((b,bi)=>({c:b.c,bi})).filter(({c})=>c&&c!=='');
        if(!active.length)continue;

        // Si mesure de répétition (signe %)
        if(active.length===1&&active[0].c==='%'){
          doc.setFont('helvetica','bold');doc.setFontSize(18);
          doc.setTextColor(40,40,40);
          const sym='%';const sw=doc.getTextWidth(sym);
          doc.text(sym,mx+mW/2-sw/2,rowY+mH*0.67);continue;
        }

        // Positions X des accords selon le nombre
        const xs=active.map(({bi})=>mx+2+(bi/4)*mW*0.98);
        // FS selon nombre d'accords
        const fs=active.length===1?13:active.length===2?11:9;
        doc.setFont('helvetica','bold');doc.setFontSize(fs);
        doc.setTextColor(15,15,15);
        active.forEach(({c},k)=>{
          const disp=applyPrefs(c,prefs)||c;
          doc.text(disp,xs[k],rowY+mH*0.67,{maxWidth:mW*0.48});
        });
      }
      // Barline droite finale
      doc.setDrawColor(50,50,50);doc.setLineWidth(0.5);
      const xEnd=x0+rowMM.length*mW;
      doc.line(xEnd,rowY,xEnd,rowY+mH);
      y+=mH;
    }
    y+=3;
  }

  // ── Pied de page sur dernière page ──
  doc.setFont('helvetica','normal');doc.setFontSize(7);
  doc.setTextColor(180,180,180);
  doc.text('Soupir. — '+new Date().toLocaleDateString('fr-FR'),mL,H-6);

  // Téléchargement
  const safe=(piece.title||'grille').replace(/[^\w\u00C0-\u024F\s\-]/g,'').trim();
  doc.save((safe||'grille')+'.pdf');
}

// ─── EDITOR SCREEN ────────────────────────────────────────────────────────────
const GCOLS=4;
const CHORD_FS=40;      // taille accords — dominant (lisible de loin)
const MEASURE_MIN_H=136; // cellules généreuses

function EditorScreen({library,setLibrary,piece,displayKey,setDisplayKey,displayMode='maj',setDisplayMode,onBack,prefs}){
  const [degreeMode,setDegreeMode]=useState(false);
  const [showDegrees,setShowDegrees]=useState(false);
  const [showKeyPicker,setShowKeyPicker]=useState(false);
  const [showTimeSig,setShowTimeSig]=useState(false);
  const [bpm,setBpm]=useState(piece.bpm);
  const [metroOn,setMetroOn]=useState(false);
  const [beat,setBeat]=useState(0);

  // picker : 4 ou 8 beats (grande mesure) avec accord + métadonnées par temps
  const [picker,setPicker]=useState({
    visible:false,si:0,mi:0,half:'a',
    isGrande:false,cSi:null,cMi:null,
    letter:'C',acc:'',qualityId:'maj7',extensions:[],
    bass:'',bassAcc:'',
    localBeats:[mkBeat(),mkBeat(),mkBeat(),mkBeat()],selectedBeat:0,
  });
  const [measureSheet,setMeasureSheet]=useState(null); // {si, mi} — structurel uniquement
  const [barlinePick,setBarlinePick]=useState(null);   // {si, mi, side}
  const [insertSheet,setInsertSheet]=useState(null);
  const [currentPage,setCurrentPage]=useState(0);
  const [editMode,setEditMode]=useState(true); // true = édition, false = lecture
  const [barsVisible,setBarsVisible]=useState(true);
  const [sectionRenameOverlay,setSectionRenameOverlay]=useState(null); // {si, name}
  // ── Mode dessin global ───────────────────────────────────────────────────────
  const [drawMode,setDrawMode]=useState(false);
  const [drawTool,setDrawTool]=useState('crayon'); // 'crayon' | 'marqueur'
  const [drawColor,setDrawColor]=useState('#1A1A1A');
  const [drawWidth,setDrawWidth]=useState(2);
  const [isDrawing,setIsDrawing]=useState(false);
  const [drawPath,setDrawPath]=useState([]);
  const drawSvgRef=useRef(null);
  const drawUndoRef=useRef([]);
  const metroRef=useRef(null),beatRef=useRef(0);
  const barsHideRef=useRef(null);
  const undoStack=useRef([]);
  const [showPieceInfo,setShowPieceInfo]=useState(false);

  const cur=library.find(p=>p.id===piece.id)||piece;
  const timeSig=cur.timeSig||'4/4';
  const scale=buildScale(displayKey,displayMode);

  // Couleur d'accentuation (signes, reprises, volta)
  const INK_ACCENT=isDark?'#E8E4DC':'#3A2410';  // barlines : toujours encre chaude, jamais rouge
  const SIGN_ACCENT=prefs?.accentColor==='red'?'#C0392B':INK_ACCENT; // points répétition + voltas
  const SIGN_COLOR=prefs?.accentColor==='red'?'#C0392B':'#2A5A2A';

  useEffect(()=>{
    if(metroOn){const ms=60000/bpm;metroRef.current=setInterval(()=>{beatRef.current=(beatRef.current+1)%4;setBeat(beatRef.current);},ms);}
    else{clearInterval(metroRef.current);setBeat(0);beatRef.current=0;}
    return()=>clearInterval(metroRef.current);
  },[metroOn,bpm]);

  // ── Affichage temporaire des barres en mode lecture (auto-masque 3s) ─────────
  function showBarsTemp(){
    clearTimeout(barsHideRef.current);
    setBarsVisible(true);
    barsHideRef.current=setTimeout(()=>setBarsVisible(false),3000);
  }

  // ── Fonctions dessin global ──────────────────────────────────────────────────
  function getPageDrawings(){return(cur.drawings||{})[safePage]||[];}

  function ptsToPath(pts){
    return pts.map((p,i)=>(i===0?`M${p.x.toFixed(1)},${p.y.toFixed(1)}`:`L${p.x.toFixed(1)},${p.y.toFixed(1)}`)).join(' ');
  }

  function handleDrawStart(e){
    e.preventDefault();
    const svg=drawSvgRef.current;if(!svg)return;
    svg.setPointerCapture(e.pointerId);
    const r=svg.getBoundingClientRect();
    setIsDrawing(true);
    setDrawPath([{x:e.clientX-r.left,y:e.clientY-r.top}]);
  }
  function handleDrawMove(e){
    if(!isDrawing)return;
    e.preventDefault();
    const svg=drawSvgRef.current;if(!svg)return;
    const r=svg.getBoundingClientRect();
    setDrawPath(p=>[...p,{x:e.clientX-r.left,y:e.clientY-r.top}]);
  }
  function handleDrawEnd(){
    if(!isDrawing)return;
    if(drawPath.length>=2){
      const pd=ptsToPath(drawPath);
      const prev={...(cur.drawings||{})};
      drawUndoRef.current.push(prev);
      const opacity=drawTool==='marqueur'?0.35:1;
      const nd={...prev,[safePage]:[...(prev[safePage]||[]),{path:pd,color:drawColor,width:drawWidth,opacity}]};
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,drawings:nd}));
    }
    setIsDrawing(false);setDrawPath([]);
  }
  function undoDraw(){
    if(drawUndoRef.current.length===0)return;
    const prev=drawUndoRef.current.pop();
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,drawings:prev}));
  }
  function clearPageDraw(){
    drawUndoRef.current.push({...(cur.drawings||{})});
    const nd={...(cur.drawings||{}),[safePage]:[]};
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,drawings:nd}));
  }

  function handleKeyChange(newKey){
    const semi=((noteIdx(newKey)-noteIdx(cur.key))%12+12)%12;
    const flat=FLAT_KEYS.includes(newKey);
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,key:newKey,
      sections:p.sections.map(s=>(s.type==='staff'||s.type==='tab')?s:({...s,measures:s.measures.map(mm=>{
        const transBeats=(src)=>getBeats(src).map(b=>b.c?{...b,c:transChord(b.c,semi,flat)}:b);
        const newBeats=transBeats(mm);
        const newChords=newBeats.map(b=>b.c).filter(c=>c);
        const newSplit2=mm.split2?{...mm.split2,beats:transBeats(mm.split2),chords:transBeats(mm.split2).map(b=>b.c).filter(c=>c)}:null;
        return{...mm,beats:newBeats,chords:newChords.length?newChords:mm.chords||['C'],split2:newSplit2};
      })}))
    }));
    setDisplayKey(newKey);setShowKeyPicker(false);
  }

  function saveUndo(){
    const snapshot=JSON.parse(JSON.stringify(cur));
    undoStack.current=[...undoStack.current.slice(-19),snapshot];
  }
  function undo(){
    if(undoStack.current.length===0)return;
    const prev=undoStack.current[undoStack.current.length-1];
    undoStack.current=undoStack.current.slice(0,-1);
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:prev));
  }

  function updateStaffSection(si,newSection){
    saveUndo();
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
      sections:p.sections.map((s,i)=>i!==si?s:newSection)
    }));
  }
  function updateTabSection(si,newSection){
    saveUndo();
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
      sections:p.sections.map((s,i)=>i!==si?s:newSection)
    }));
  }
  function deleteSection(si){
    saveUndo();
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
      sections:p.sections.filter((_,i)=>i!==si)
    }));
  }

  function insertSection(insertAt,type,name){
    saveUndo();
    setLibrary(lib=>lib.map(p=>{
      if(p.id!==piece.id)return p;
      const secs=[...p.sections];
      const newSec=type==='staff'
        ?mkStaffSection(name,p.timeSig||'4/4','treble',p.key||'C')
        :type==='tab'
          ?mkTabSection(name,'guitar')
          :{name,type:'grid',startBar:'normal',measures:[mk(['C']),mk(['C']),mk(['C']),mk(['C'])]};
      secs.splice(insertAt,0,newSec);
      return{...p,sections:secs};
    }));
  }
  // ── Layout pages ────────────────────────────────────────────────────────────
  const rowsPerPage=cur.rowsPerPage||10;
  function computeRows(sections){
    const rows=[];let row=[];let mCount=0;
    sections.forEach((section,si)=>{
      if(section.type==='staff'){
        if(row.length>0){rows.push({cells:row,rowType:'measures'});row=[];}
        rows.push({cells:[{type:'staff',si,section}],rowType:'staff'});
      }else if(section.type==='tab'){
        if(row.length>0){rows.push({cells:row,rowType:'measures'});row=[];}
        rows.push({cells:[{type:'tab',si,section}],rowType:'tab'});
      }else{
        let lastMasterMi=0;
        section.measures.forEach((measure,mi)=>{
          const prevM=mi>0?section.measures[mi-1]:null;
          const isContinuation=!!(prevM&&prevM.barAfter==='none');
          if(!isContinuation){mCount++;lastMasterMi=mi;}
          // Saut de ligne forcé (lineBreak) ou espace avant ligne (rowSpacer) → nouvelle rangée
          if((measure.lineBreak||measure.rowSpacer)&&row.length>0&&!isContinuation){rows.push({cells:row,rowType:'measures'});row=[];}
          row.push({type:'measure',si,mi,measure,section,sectionStart:mi===0,sectionName:section.name,num:isContinuation?null:mCount,isContinuation,masterMi:isContinuation?lastMasterMi:mi});
          if(row.length===GCOLS){rows.push({cells:row,rowType:'measures'});row=[];}
        });
      }
    });
    if(row.length>0)rows.push({cells:row,rowType:'measures'});
    return rows;
  }
  const allRows=computeRows(cur.sections);
  const TOPBAR_H=52,BOTTOMBAR_H=44,INFO_H=36;
  const fullscreen=!editMode&&!barsVisible;
  const availH=(typeof window!=='undefined'?window.innerHeight:900)
    -(fullscreen?0:TOPBAR_H)-(fullscreen?0:BOTTOMBAR_H)-(fullscreen?0:INFO_H);
  const rowH=Math.max(56,Math.floor(availH/rowsPerPage));
  const ROW_PAD=7; // espace vertical au-dessus et en dessous du contenu de chaque rangée
  const barH=Math.max(36,rowH-ROW_PAD*2); // hauteur effective des barlines
  const totalPages=Math.max(1,Math.ceil(allRows.length/rowsPerPage));
  const safePage=Math.min(currentPage,totalPages-1);
  const pageRows=allRows.slice(safePage*rowsPerPage,(safePage+1)*rowsPerPage);
  const chordFsBase=Math.max(13,Math.round(CHORD_FS*rowH/100)); // CHORD_FS=40 → ~40px à rowH=100

  // Ouvre le ChordPicker pour une GRANDE MESURE — 8 beats (master 0-3 + suite 4-7)
  function openGrandeMeasurePicker(si,mi,cSi,cMi,e,initialBeat=null){
    if(e)e.stopPropagation();
    const mm=cur.sections[si]?.measures[mi];
    const cMm=cur.sections[cSi]?.measures[cMi];
    if(!mm||!cMm)return;
    const localBeats=[...getBeats(mm),...getBeats(cMm)];
    let selectedBeat=0;
    if(initialBeat!==null&&initialBeat>=0&&initialBeat<8){
      selectedBeat=initialBeat;
    } else {
      const ff=localBeats.find(b=>b.c&&!isSpec(b.c));
      selectedBeat=ff?localBeats.indexOf(ff):0;
    }
    const initChord=localBeats[selectedBeat]?.c||'';
    const firstChord=(initChord&&!isSpec(initChord))?initChord:'C';
    const parsed=parseChordFull(firstChord);
    const{letter,acc}=rootToLetterAcc(parsed.root);
    const bR=parsed.bass||'';
    const{letter:bL,acc:bA}=bR?rootToLetterAcc(bR):{letter:'',acc:''};
    setPicker({visible:true,si,mi,half:'a',isGrande:true,cSi,cMi,
      letter,acc,qualityId:parsed.qualityId,extensions:parsed.extensions,
      bass:bL,bassAcc:bA,localBeats,selectedBeat});
  }

  // Ouvre le ChordPicker pour UNE MESURE ENTIÈRE — 4 beats chargés en local
  function openMeasurePicker(si,mi,half='a',e,initialBeat=null){
    if(e)e.stopPropagation();
    saveUndo();
    const mm=cur.sections[si]?.measures[mi];
    if(!mm)return;
    const measureData=(half==='b'&&mm.split2)?mm.split2:mm;
    const localBeats=getBeats(measureData);
    // Choisir le beat initial : celui cliqué, ou le premier non-vide non-spécial
    let selectedBeat=0;
    if(initialBeat!==null&&initialBeat>=0&&initialBeat<4){
      selectedBeat=initialBeat;
    } else {
      const firstFilled=localBeats.find(b=>b.c&&!isSpec(b.c));
      selectedBeat=firstFilled?localBeats.indexOf(firstFilled):0;
    }
    const initChord=localBeats[selectedBeat]?.c||'';
    const firstChord=(initChord&&!isSpec(initChord))?initChord:'C';
    const parsed=parseChordFull(firstChord);
    const{letter,acc}=rootToLetterAcc(parsed.root);
    const bR=parsed.bass||'';
    const{letter:bL,acc:bA}=bR?rootToLetterAcc(bR):{letter:'',acc:''};
    setPicker({visible:true,si,mi,half,
      letter,acc,qualityId:parsed.qualityId,extensions:parsed.extensions,
      bass:bL,bassAcc:bA,
      localBeats,selectedBeat,
      timeSig:measureData.timeSig||null,
      cpkTab:'accord'});
  }

  // Applique les beats en temps réel sans fermer le picker (compact mode)
  function applyMeasureLive(pk){
    const{si,mi,half,localBeats,timeSig}=pk||picker;
    const clean=bs=>bs.map(b=>({c:b.c||'',s:b.s||[],v:b.v||null,t:b.t||''}));
    const safeC=bs=>{const c=bs.map(b=>b.c).filter(c=>c);return c.length?c:[''];};
    const cleanBeats=clean(localBeats||[mkBeat(),mkBeat(),mkBeat(),mkBeat()]);
    const safeChords=safeC(cleanBeats);
    const tsVal=timeSig||null;
    setLibrary(lib=>lib.map(p=>{
      if(p.id!==piece.id)return p;
      return{...p,sections:p.sections.map((s,sI)=>{
        if(sI!==si)return s;
        return{...s,measures:s.measures.map((mm,mI)=>{
          if(mI!==mi)return mm;
          if(half==='b'&&mm.split2){return{...mm,split2:{...mm.split2,beats:cleanBeats,chords:safeChords}};}
          return{...mm,beats:cleanBeats,chords:safeChords,timeSig:tsVal};
        })};
      })};
    }));
  }

  // Sauvegarde les 4 beats (accord + métadonnées) de la mesure en une seule opération
  function confirmMeasure(){
    saveUndo();
    const{si,mi,half,localBeats,isGrande,cSi,cMi}=picker;
    const clean=bs=>bs.map(b=>({c:b.c||'',s:b.s||[],v:b.v||null,t:b.t||''}));
    const safeC=bs=>{const c=bs.map(b=>b.c).filter(c=>c);return c.length?c:[''];};
    if(isGrande){
      const mb=clean((localBeats||[]).slice(0,4));
      const cb=clean((localBeats||[]).slice(4,8));
      setLibrary(lib=>lib.map(p=>{
        if(p.id!==piece.id)return p;
        return{...p,sections:p.sections.map((s,sI)=>{
          if(sI!==si)return s;
          return{...s,measures:s.measures.map((mm,mI)=>{
            if(mI===mi)return{...mm,beats:mb,chords:safeC(mb)};
            if(mI===cMi)return{...mm,beats:cb,chords:safeC(cb)};
            return mm;
          })};
        })};
      }));
      setPicker(pk=>({...pk,visible:false}));
      return;
    }
    const cleanBeats=clean(localBeats||[mkBeat(),mkBeat(),mkBeat(),mkBeat()]);
    const safeChords=safeC(cleanBeats);
    setLibrary(lib=>lib.map(p=>{
      if(p.id!==piece.id)return p;
      return{...p,sections:p.sections.map((s,sI)=>{
        if(sI!==si)return s;
        return{...s,measures:s.measures.map((mm,mI)=>{
          if(mI!==mi)return mm;
          if(half==='b'&&mm.split2){
            return{...mm,split2:{...mm.split2,beats:cleanBeats,chords:safeChords}};
          }
          return{...mm,beats:cleanBeats,chords:safeChords};
        })};
      })};
    }));
    setPicker(pk=>({...pk,visible:false}));
  }

  function renameSectionAtPicker(name){
    saveUndo();
    const{si}=picker;
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
      sections:p.sections.map((s,sI)=>sI!==si?s:{...s,name})
    }));
  }

  function renameSectionDirect(si, name){
    saveUndo();
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
      sections:p.sections.map((s,sI)=>sI!==si?s:{...s,name})
    }));
    setSectionRenameOverlay(null);
  }


  function updateBarline(si,mi,side,type){
    saveUndo();
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
      sections:p.sections.map((s,sI)=>{
        if(sI!==si)return s;
        if(side==='right')return{...s,measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,barAfter:type})};
        if(mi===0)return{...s,startBar:type};
        return{...s,measures:s.measures.map((mm,mI)=>mI!==(mi-1)?mm:{...mm,barAfter:type})};
      })
    }));
    setBarlinePick(null);
  }

  function handleMeasureAction(si,mi,action){
    saveUndo();
    if(action==='addChord'){
      const mm0=cur.sections[si].measures[mi];
      const beats0=getBeats(mm0);
      const firstEmpty=beats0.findIndex(b=>!b.c);
      if(firstEmpty===-1)return; // tous les temps remplis
      const lastFilled=[...beats0].reverse().find(b=>b.c);
      const srcChord=lastFilled?.c||'C';
      const nb=beats0.map((b,i)=>i===firstEmpty?{...b,c:srcChord}:b);
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,beats:nb,chords:nb.map(b=>b.c).filter(c=>c)})
        })
      }));
    }
    else if(action==='removeChord'){
      const mm0=cur.sections[si].measures[mi];
      const beats0=getBeats(mm0);
      const filledIdxs=beats0.map((b,i)=>b.c?i:-1).filter(i=>i>=0);
      if(filledIdxs.length<=1)return;
      const lastIdx=filledIdxs[filledIdxs.length-1];
      const nb=beats0.map((b,i)=>i===lastIdx?mkBeat():b);
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,beats:nb,chords:nb.map(b=>b.c).filter(c=>c)})
        })
      }));
    }
    else if(action==='split'){
      const srcBeats=getBeats(cur.sections[si].measures[mi]);
      const srcChord=srcBeats.find(b=>b.c)?.c||'C';
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,split2:mkSplit2([srcChord])})
        })
      }));
    }
    else if(action==='unsplit'){
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,split2:null})
        })
      }));
    }
    else if(action==='addMeasure'||action==='addAfter'){
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:[...s.measures.slice(0,mi+1),mk([]),...s.measures.slice(mi+1)]
        })
      }));
    }
    else if(action==='addBefore'){
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:[...s.measures.slice(0,mi),mk([]),...s.measures.slice(mi)]
        })
      }));
    }
    else if(action==='setRowSpacerS'||action==='setRowSpacerM'||action==='setRowSpacerL'||action==='clearRowSpacer'){
      const sz=action==='setRowSpacerS'?1:action==='setRowSpacerM'?2:action==='setRowSpacerL'?3:undefined;
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,rowSpacer:sz})
        })
      }));
    }
    else if(action==='deleteMeasure'){
      const sec=cur.sections[si];
      if(sec.measures.length<=1)return;
      saveUndo();
      // Si c'est un master de grande mesure (barAfter==='none'), supprimer aussi la continuation
      const isMasterGM=sec.measures[mi]?.barAfter==='none';
      const contMi=isMasterGM?mi+1:null;
      // Si c'est une continuation, supprimer aussi le master
      const prevM=mi>0?sec.measures[mi-1]:null;
      const isCont=!!(prevM&&prevM.barAfter==='none');
      const masterMi=isCont?mi-1:null;
      const toDelete=new Set([mi]);
      if(contMi!=null&&contMi<sec.measures.length)toDelete.add(contMi);
      if(masterMi!=null)toDelete.add(masterMi);
      if(sec.measures.length-toDelete.size<1)return; // garder au moins 1
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,measures:s.measures.filter((_,mI)=>!toDelete.has(mI))})
      }));
    }
  }

  function addMeasureAtEnd(si){
    saveUndo();
    setLibrary(lib=>lib.map(p=>{
      if(p.id!==piece.id)return p;
      return{...p,sections:p.sections.map((s,sI)=>{
        if(sI!==si)return s;
        return{...s,measures:[...s.measures,mk([])]};
      })};
    }));
  }

  function setMeasureLabel(si,mi,label){
    setLibrary(lib=>lib.map(p=>{
      if(p.id!==piece.id)return p;
      return{...p,sections:p.sections.map((s,sI)=>{
        if(sI!==si)return s;
        return{...s,measures:s.measures.map((mm,mI)=>{
          if(mI!==mi)return mm;
          if(!label){const{label:_,...rest}=mm;return rest;}
          return{...mm,label};
        })};
      })};
    }));
  }

  function getDisp(chord){
    if(!degreeMode)return applyPrefs(chord,prefs);
    return chordToDeg(chord,displayKey)||applyPrefs(chord,prefs)+'✱';
  }

  // ── Rendu d'une demi-case — positionnement par temps ──────────────────────────
  // num = numéro de mesure (null pour half B d'un split)
  function renderHalf(mm,half,si,mi,num){
    const data=half==='b'?mm.split2:mm;
    const beats=getBeats(data);
    const nFilled=beats.filter(b=>b.c).length||1;
    // Taille adaptative : 4 beats = légèrement réduit, 1 beat = pleine taille
    const chFs=nFilled>=4?Math.round(chordFsBase*0.82)
              :nFilled===3?Math.round(chordFsBase*0.88)
              :nFilled===2?Math.round(chordFsBase*0.93)
              :chordFsBase;
    const VOLTA_H=19;

    const isSel=editMode&&picker.visible&&!picker.isGrande&&picker.si===si&&picker.mi===mi&&picker.half===(half||'a');
    // Signes sur l'ensemble de la mesure (toutes positions) → overlay centré en haut
    const measureSignIds=[...new Set(beats.flatMap(b=>b.s||[]))];
    const hasMeasureSigns=measureSignIds.length>0;
    const hasVoltaBeat0=!!beats[0]?.v;
    return(
      <div style={{flex:1,display:'flex',minWidth:0,position:'relative',
        background:isSel?'rgba(58,155,213,0.09)':'transparent',
        transition:'background 0.12s'}}>

        {/* ── Signes musicaux — overlay en haut de la mesure entière ── */}
        {hasMeasureSigns&&(
          <div style={{position:'absolute',top:hasVoltaBeat0?VOLTA_H+2:1,left:1,
            pointerEvents:'none',zIndex:3,lineHeight:1}}>
            <span style={{fontSize:20,color:SIGN_COLOR,fontWeight:900,
              background:SIGN_COLOR+'18',borderRadius:4,padding:'2px 5px',lineHeight:1.1,whiteSpace:'nowrap'}}>
              {measureSignIds.map(s=>{const st=SIGN_TYPES.find(x=>x.id===s);return st?st.sym:s;}).join(' ')}
            </span>
          </div>
        )}

        {/* ── 4 colonnes de temps ── */}
        {beats.map((beat,bi)=>{
          const chord=beat.c||'';
          const hasChord=!!chord;
          const hasVolta=!!beat.v;
          const hasText=!!beat.t;
          const spec=isSpec(chord);
          const idem=chord==='%';
          const isDia=!spec&&!idem&&hasChord&&chordToDeg(chord,displayKey)!==null;
          const disp=spec?chord:(idem?'%':getDisp(chord));
          const chColor=idem?'#B0A08A':(degreeMode&&!spec?(isDia?TH.text:'#8A3020'):TH.text);
          // Réduction de police pour les accords longs (évite débordement)
          const dispLen=disp?disp.replace(/[♭♯%]/g,'xx').length:0;
          const lenScale=dispLen>=8?0.76:dispLen>=7?0.83:dispLen>=6?0.90:dispLen>=5?0.95:1;
          const effectiveFs=Math.round(chFs*lenScale);
          return(
            <div key={bi}
              onClick={editMode?(e)=>{e.stopPropagation();openMeasurePicker(si,mi,half,e,bi);}:undefined}
              style={{flex:1,minWidth:0,overflow:'visible',position:'relative',cursor:editMode?'pointer':'default'}}>
              {/* Crochet de volta — absolu */}
              {hasVolta&&(
                <div style={{position:'absolute',top:0,left:0,right:0,height:VOLTA_H,
                  borderLeft:`2.5px solid ${SIGN_ACCENT}`,borderTop:`2.5px solid ${SIGN_ACCENT}`,
                  display:'flex',alignItems:'flex-start',paddingLeft:3,paddingTop:2,
                  pointerEvents:'none',zIndex:2}}>
                  <span style={{fontSize:10,fontWeight:900,color:SIGN_ACCENT,lineHeight:1,fontStyle:'italic'}}>
                    {beat.v}.
                  </span>
                </div>
              )}
              {/* Accord — absolu, collé à gauche, centré verticalement */}
              {hasChord&&(
                <span style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',
                  background:degreeMode&&!isDia&&!spec&&!idem?'#F5DDD8':'transparent',
                  borderRadius:4,lineHeight:1,display:'inline-flex',alignItems:'center',zIndex:1,whiteSpace:'nowrap'}}>
                  {spec?(<span style={{fontSize:effectiveFs,fontWeight:700,color:chColor,letterSpacing:'0.05em',lineHeight:1}}>{disp}</span>)
                  :idem?(<span style={{fontSize:Math.round(effectiveFs*1.05),fontWeight:400,fontStyle:'italic',color:chColor,letterSpacing:'0.06em',lineHeight:1,fontFamily:CHORD_FONT}}>%</span>)
                  :degreeMode?(<DegreeText deg={disp} fs={effectiveFs} color={chColor} weight={500}/>)
                  :(<ChordText chord={disp} fs={effectiveFs} color={chColor} weight={600}/>)}
                </span>
              )}
              {!hasChord&&editMode&&(
                <span style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',
                  fontSize:10,color:'#D0CAC0',fontWeight:300,lineHeight:1,userSelect:'none'}}>·</span>
              )}
              {/* Annotation — absolu en haut, sous la volta si présente */}
              {hasText&&(
                <div style={{position:'absolute',top:hasVolta?VOLTA_H+2:3,left:0,right:0,
                  textAlign:'center',fontSize:8,fontStyle:'italic',
                  fontWeight:400,fontFamily:"Georgia,'Times New Roman',serif",
                  color:'#9A7050',lineHeight:1.2,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                  pointerEvents:'none',zIndex:2}}>
                  {beat.t}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

  const isDark=!!prefs?.darkMode;
  const TH={
    bg:isDark?'#1A1816':'#EDE8DC',
    topBar:isDark?'rgba(26,24,22,0.97)':'rgba(242,237,228,0.96)',
    border:isDark?'#3A3634':'#C4B8A4',
    infoBg:isDark?'rgba(22,20,18,0.98)':'rgba(248,243,234,0.97)',
    gridBg:isDark?'#1E1C1A':'#FAF6EE',
    rowBorder:isDark?'rgba(255,255,255,0.05)':'rgba(80,50,10,0.06)',
    fillerBg:isDark?'#161412':'#F0E8D8',
    text:isDark?'#F2EDE4':'#2C1F0F',
    subText:isDark?'#8A8480':'#8A7060',
    btnBg:isDark?'#2A2826':'#E8E0D0',
    btnBorder:isDark?'#4A4845':'#C4B49A',
    modeSwBg:isDark?'#2A2826':'#D8D0C0',
    modeSwActive:isDark?'#3A3836':'#FAF6EE',
  };
  return(<div className="app-screen" style={{display:'flex',flexDirection:'column',background:TH.bg}}>

    {/* TOP BAR */}
    <div style={{background:TH.topBar,backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
      borderBottom:`0.5px solid ${TH.border}`,height:52,
      display:fullscreen?'none':'flex',alignItems:'center',padding:'0 12px',gap:7,flexShrink:0}}>
      <button onClick={onBack}
        style={{background:'transparent',border:'none',color:TH.text,fontSize:20,cursor:'pointer',padding:'4px 6px 4px 0',fontFamily:'inherit',flexShrink:0}}>←</button>
      <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
        <SoupirLogo size={16}/><span style={{fontSize:14,fontWeight:900,letterSpacing:'-0.5px'}}>Soupir.</span>
      </div>
      <div style={{width:1,height:16,background:TH.btnBorder,flexShrink:0}}/>
      <span style={{fontSize:13,fontWeight:700,flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:TH.text}}>{cur.title}</span>
      <button onClick={()=>setShowTimeSig(true)} className="icon-btn"
        style={{background:TH.btnBg,border:`1.5px solid ${TH.btnBorder}`,borderRadius:100,padding:'3px 10px',cursor:'pointer',flexShrink:0,fontFamily:'inherit',color:TH.text}}>
        <span style={{fontSize:12,fontWeight:800}}>{timeSig}</span>
      </button>
      <button onClick={()=>setShowKeyPicker(true)} className="icon-btn"
        style={{display:'flex',alignItems:'center',gap:3,background:TH.btnBg,border:`1.5px solid ${TH.btnBorder}`,borderRadius:100,padding:'3px 10px',cursor:'pointer',flexShrink:0}}>
        <span style={{fontSize:9,color:TH.subText,fontWeight:600}}>Ton.</span>
        <span style={{fontSize:12,fontWeight:800,color:TH.text}}>{displayKey}{displayMode==='min'?'m':''}</span>
      </button>
      <button onClick={()=>setDegreeMode(d=>!d)}
        style={{background:degreeMode?TH.text:'transparent',border:`1.5px solid ${TH.text}`,color:degreeMode?(isDark?'#1A1A1A':'#F2EDE4'):TH.text,
          padding:'3px 9px',borderRadius:100,fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,fontFamily:'inherit'}}>
        {degreeMode?'Degrés':'Acc.'}
      </button>
      <div style={{display:'flex',alignItems:'center',gap:4,background:TH.btnBg,border:`1.5px solid ${TH.btnBorder}`,borderRadius:100,padding:'3px 7px',flexShrink:0}}>
        <div style={{display:'flex',gap:2}}>
          {[0,1,2,3].map(i=>(<div key={i} style={{width:4,height:4,borderRadius:'50%',transition:'all 0.06s',
            background:metroOn&&beat===i?(i===0?TH.text:'#6B6560'):'#C0BAB0',
            transform:metroOn&&beat===i?'scale(1.35)':'scale(1)'}}/>))}
        </div>
        <input type="number" value={bpm} min={40} max={300} onChange={e=>setBpm(Number(e.target.value))}
          style={{width:30,background:'transparent',border:'none',color:TH.text,fontSize:11,fontWeight:700,textAlign:'center',outline:'none',fontFamily:'inherit'}}/>
        <button onClick={()=>setMetroOn(m=>!m)}
          style={{background:metroOn?TH.text:'transparent',border:`1.5px solid ${metroOn?TH.text:TH.btnBorder}`,
            color:metroOn?(isDark?'#1A1A1A':'#F2EDE4'):TH.subText,width:18,height:18,borderRadius:'50%',cursor:'pointer',
            fontSize:7,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>
          {metroOn?'■':'▶'}
        </button>
      </div>
      <button onClick={()=>setShowDegrees(v=>!v)}
        style={{background:showDegrees?TH.text:'transparent',border:`1.5px solid ${showDegrees?TH.text:TH.btnBorder}`,
          color:showDegrees?(isDark?'#1A1A1A':'#F2EDE4'):TH.subText,height:26,borderRadius:100,cursor:'pointer',
          fontSize:9,fontWeight:700,padding:'0 7px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'inherit',whiteSpace:'nowrap'}}>Gamme</button>
      <button onClick={()=>exportPDF(cur,displayKey,displayMode,prefs)}
        title="Exporter en PDF"
        style={{background:'transparent',border:`1.5px solid ${TH.btnBorder}`,color:TH.subText,height:26,borderRadius:100,cursor:'pointer',
          fontSize:9,fontWeight:700,padding:'0 8px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'inherit',whiteSpace:'nowrap',gap:3}}>
        <span style={{fontSize:11}}>↓</span>PDF
      </button>
    </div>

    {/* CONTENT — page plein écran, zéro scroll */}
    <div style={{flex:1,overflow:'hidden',position:'relative',background:TH.bg,display:'flex',flexDirection:'column'}}>

      {/* ── Overlay titre + compositeur (fullscreen uniquement) ── */}
      {fullscreen&&(
        <div style={{position:'absolute',top:0,left:0,right:0,zIndex:10,
          padding:'10px 16px 8px',pointerEvents:'none',
          background:`linear-gradient(to bottom,${isDark?'rgba(26,24,22,0.55)':'rgba(255,255,255,0.55)'} 0%,transparent 100%)`}}>
          <div style={{fontSize:14,fontWeight:800,color:TH.text,opacity:0.55,
            letterSpacing:'-0.3px',lineHeight:1.2,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cur.title}</div>
          {cur.composer&&<div style={{fontSize:10,fontWeight:500,color:TH.subText,opacity:0.55,
            marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cur.composer}</div>}
        </div>
      )}

      {/* ── Métronome visuel (dot pulsant, fullscreen + metroOn) ── */}
      {!editMode&&metroOn&&(
        <div style={{position:'absolute',bottom:14,right:14,zIndex:20,
          display:'flex',alignItems:'center',gap:5,pointerEvents:'none'}}>
          {[0,1,2,3].map(i=>(
            <div key={i} style={{
              width: beat===i&&metroOn ? (i===0?14:10) : (i===0?10:7),
              height: beat===i&&metroOn ? (i===0?14:10) : (i===0?10:7),
              borderRadius:'50%',
              background: beat===i ? (i===0?(isDark?'#F2EDE4':'#1A1A1A'):(isDark?'#9A9490':'#6B6560')) : (isDark?'rgba(255,255,255,0.18)':'rgba(0,0,0,0.15)'),
              transition:'all 0.07s ease',
              flexShrink:0
            }}/>
          ))}
        </div>
      )}

      {/* Bandeau titre + sélecteur Lecture/Édition */}
      <div style={{display:fullscreen?'none':'flex',alignItems:'center',padding:'0 10px',gap:8,borderBottom:`0.5px solid ${TH.border}`,
        background:TH.infoBg,height:INFO_H,flexShrink:0}}>
        <button onClick={()=>setShowPieceInfo(true)}
          style={{background:'transparent',border:'none',padding:0,cursor:'pointer',fontFamily:'inherit',
            flex:1,textAlign:'left',overflow:'hidden'}}>
          <span style={{fontSize:13,fontWeight:800,letterSpacing:'-0.4px',color:TH.text,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{cur.title}</span>
          {cur.composer&&<span style={{fontSize:10,fontWeight:500,color:TH.subText,
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'block'}}>{cur.composer}</span>}
        </button>
        {degreeMode&&<span style={{fontSize:9,fontWeight:700,color:'#4A3F2F',background:'#F5DDD8',
          borderRadius:4,padding:'1px 5px',flexShrink:0}}>Degrés</span>}
        {/* Bouton dessin */}
        <button onClick={()=>setDrawMode(d=>!d)}
          style={{background:drawMode?TH.text:'transparent',
            border:`1.5px solid ${drawMode?TH.text:TH.btnBorder}`,
            borderRadius:100,padding:'3px 10px',fontSize:12,cursor:'pointer',
            fontFamily:'inherit',color:drawMode?(isDark?'#1A1A1A':'#F2EDE4'):TH.subText,
            fontWeight:700,flexShrink:0,transition:'all 0.12s'}}>
          ✎
        </button>
        {/* Sélecteur Lecture / Édition */}
        <div style={{display:'flex',background:TH.modeSwBg,borderRadius:8,padding:2,gap:1,flexShrink:0}}>
          <button onClick={()=>{setEditMode(false);setBarsVisible(false);clearTimeout(barsHideRef.current);}}
            style={{background:!editMode?TH.modeSwActive:'transparent',border:'none',
              borderRadius:6,padding:'3px 9px',fontSize:10,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',color:!editMode?TH.text:TH.subText,
              boxShadow:!editMode?'0 1px 3px rgba(0,0,0,0.12)':'none',transition:'all 0.12s'}}>
            👁 Lire
          </button>
          <button onClick={()=>{setEditMode(true);setBarsVisible(true);clearTimeout(barsHideRef.current);}}
            style={{background:editMode?'#1A1A1A':'transparent',border:'none',
              borderRadius:6,padding:'3px 9px',fontSize:10,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',color:editMode?'#F2EDE4':TH.subText,
              boxShadow:editMode?'0 1px 3px rgba(0,0,0,0.12)':'none',transition:'all 0.12s'}}>
            ✏ Éditer
          </button>
        </div>
      </div>

      {/* Grille pages */}
      <div className="grid-paper" onClick={!editMode&&!drawMode?showBarsTemp:undefined}
        style={{flex:1,display:'flex',flexDirection:'column',overflow:'auto',background:TH.gridBg,
          position:'relative',cursor:!editMode&&!drawMode?'pointer':undefined}}>
        {/* Pre-pass : détecter les rows dont la section se termine à pleine capacité
            → le "+" doit apparaître au début de la row suivante, ou dans la 1re ligne vide */}
        {(()=>{
          if(editMode){
            pageRows._addSiForFiller=null;
            pageRows.forEach((row,ri)=>{
              if(row.rowType!=='measures')return;
              const lc=row.cells[row.cells.length-1];
              if(!lc||lc.type!=='measure')return;
              const sec=cur.sections[lc.si];
              if(sec?.type&&sec.type!=='grid')return;
              if(lc.mi===sec.measures.length-1&&!lc.isContinuation&&row.cells.length===GCOLS){
                // tag la row suivante si elle existe, sinon la 1re ligne vide
                const nextRow=pageRows[ri+1];
                if(nextRow)nextRow._addMeasureSi=lc.si;
                else pageRows._addSiForFiller=lc.si;
              }
            });
          }
          return null;
        })()}
        {pageRows.map((row,ri)=>{
          if(row.rowType==='staff'){
            const item=row.cells[0];
            return(
              <div key={ri} style={{flexShrink:0,overflow:'auto'}}>
                <StaffSectionView section={item.section}
                  editMode={editMode}
                  prefs={prefs}
                  onUpdate={ns=>updateStaffSection(item.si,ns)}
                  onDelete={cur.sections.length>1?()=>deleteSection(item.si):null}/>
              </div>
            );
          }
          if(row.rowType==='tab'){
            const item=row.cells[0];
            return(
              <div key={ri} style={{flexShrink:0,overflow:'auto'}}>
                <TabSectionView section={item.section}
                  editMode={editMode}
                  prefs={prefs}
                  onUpdate={ns=>updateTabSection(item.si,ns)}
                  onDelete={cur.sections.length>1?()=>deleteSection(item.si):null}/>
              </div>
            );
          }
          const firstCell=row.cells[0];
          // Détecter si la dernière cellule réelle est la fin d'une section grille (row non-plein)
          const lastRealCell=row.cells[row.cells.length-1];
          const lastRealSi=lastRealCell?.si;
          const lastRealSection=lastRealSi!=null?cur.sections[lastRealSi]:null;
          const isLastOfSection=editMode&&lastRealSection&&
            (!lastRealSection.type||lastRealSection.type==='grid')&&
            lastRealCell.mi===lastRealSection.measures.length-1&&
            !lastRealCell.isContinuation&&row.cells.length<GCOLS;
          // "+" en début de row : provient d'une section terminée en row pleine
          const addSiAtStart=editMode?row._addMeasureSi:null;
          const rowSpacerSz=row.cells.reduce((acc,c)=>Math.max(acc,c.measure?.rowSpacer||0),0);
          const spacerMT=rowSpacerSz===1?Math.round(rowH*0.25):rowSpacerSz===2?Math.round(rowH*0.5):rowSpacerSz===3?Math.round(rowH*0.9):0;
          return(
            <div key={ri} style={{height:rowH,flexShrink:0,display:'flex',alignItems:'stretch',position:'relative',
              overflow:'visible',
              marginTop:spacerMT,
              paddingTop:ROW_PAD,paddingBottom:ROW_PAD}}>
              {/* Barre gauche — avec badge "+" si la section précédente se termine ici */}
              <div style={{position:'relative',display:'flex',flexShrink:0}}>
                <Barline
                  type={firstCell.mi===0?(cur.sections[firstCell.si].startBar||'normal'):'normal'}
                  onClick={editMode?(e)=>{e.stopPropagation();setBarlinePick({si:firstCell.si,mi:firstCell.mi,side:'left'});}:undefined}
                  minH={barH} accentColor={INK_ACCENT} dotsColor={SIGN_ACCENT}/>
                {addSiAtStart!=null&&(
                  <button onClick={()=>{addMeasureAtEnd(addSiAtStart);setCurrentPage(Math.ceil((allRows.length+1)/rowsPerPage)-1);}}
                    style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
                      width:26,height:26,background:'#F2F0EB',border:'1.5px solid #D0CAC0',borderRadius:'50%',
                      fontSize:18,cursor:'pointer',color:'#8A847C',display:'flex',alignItems:'center',
                      justifyContent:'center',fontWeight:300,padding:0,lineHeight:1,zIndex:20,
                      boxShadow:'0 1px 4px rgba(0,0,0,0.15)'}}>+</button>
                )}
              </div>
              {/* Mesures */}
              {(()=>{
                const rendered=[];let skip=false;
                // Suppression de mesure déplacée dans la MeasureSheet (tap sur mesure)
                row.cells.forEach((cell,ci)=>{
                  if(skip){skip=false;return;}
                  const{si,mi,measure,num,sectionStart,sectionName,isContinuation}=cell;
                  const isMaster=!isContinuation&&measure.barAfter==='none';
                  const nextCell=row.cells[ci+1];
                  const isGrande=isMaster&&nextCell&&nextCell.isContinuation;

                  // ── Grande mesure : master + continuation fusionnés ──────────────
                  if(isGrande){
                    skip=true;
                    const{si:cSi,mi:cMi,measure:cMm}=nextCell;
                    // Grande mesure : 8 beats (4 master + 4 cont), positionnés par temps
                    const masterBeats=getBeats(measure);
                    const contBeats=getBeats(cMm);
                    const allBeats=[
                      ...masterBeats.map((b,bi)=>({...b,key:`m${mi}-b${bi}`})),
                      ...contBeats.map((b,bi)=>({...b,key:`m${cMi}-b${bi}`})),
                    ];
                    const nFilled=allBeats.filter(b=>b.c).length||1;
                    const chFs=nFilled>=8?Math.round(chordFsBase*0.72)
                              :nFilled>=6?Math.round(chordFsBase*0.80)
                              :nFilled>=4?Math.round(chordFsBase*0.86)
                              :nFilled>=2?Math.round(chordFsBase*0.93)
                              :chordFsBase;
                    const VOLTA_H=19;
                    rendered.push(
                      <React.Fragment key={`${si}-${mi}-gm`}>
                        <div style={{flex:2,position:'relative',display:'flex',
                            minWidth:0,overflow:'hidden',
                            background:editMode&&picker.visible&&picker.isGrande&&picker.si===si&&picker.mi===mi?'rgba(58,155,213,0.09)':'transparent',
                            transition:'background 0.12s'}}>
                          {/* Signes musicaux — overlay grande mesure */}
                          {(()=>{const gmSignIds=[...new Set(allBeats.flatMap(b=>b.s||[]))];const gmHasVolta=!!allBeats[0]?.v;return gmSignIds.length>0&&(
                            <div style={{position:'absolute',top:gmHasVolta?VOLTA_H+2:1,left:1,pointerEvents:'none',zIndex:3,lineHeight:1}}>
                              <span style={{fontSize:20,color:SIGN_COLOR,fontWeight:900,background:SIGN_COLOR+'18',borderRadius:4,padding:'2px 5px',lineHeight:1.1,whiteSpace:'nowrap'}}>
                                {gmSignIds.map(s=>{const st=SIGN_TYPES.find(x=>x.id===s);return st?st.sym:s;}).join(' ')}
                              </span>
                            </div>
                          );})()}
                          {/* Badge nom de section — première grande mesure de chaque section */}
                          {sectionStart&&sectionName&&(
                            <div style={{position:'absolute',bottom:3,left:ci===0?6:4,zIndex:7,
                              background:isDark?'rgba(60,80,120,0.85)':'rgba(30,48,96,0.82)',
                              color:'#B8D4FF',borderRadius:3,
                              fontSize:8,fontWeight:900,padding:'1px 5px',lineHeight:1.5,
                              letterSpacing:0.8,pointerEvents:'none',whiteSpace:'nowrap',
                              maxWidth:'40%',overflow:'hidden',textOverflow:'ellipsis'}}>
                              {sectionName}
                            </div>
                          )}
                          {/* 8 temps : 4 + séparateur 20px + 4 → aligne le 5e accord avec une mesure seule */}
                          {allBeats.flatMap((beat,bi)=>{
                            const chord=beat.c||'';
                            const hasChord=!!chord;
                            const hasVolta=!!beat.v;
                            const hasText=!!beat.t;
                            const spec=isSpec(chord);const idem=chord==='%';
                            const isDia=!spec&&!idem&&hasChord&&chordToDeg(chord,displayKey)!==null;
                            const disp=spec?chord:(idem?'%':getDisp(chord));
                            const chColor=idem?'#B0A08A':(degreeMode&&!spec?(isDia?TH.text:'#8A3020'):TH.text);
                            const gDispLen=disp?disp.replace(/[♭♯%]/g,'xx').length:0;
                            const gLenScale=gDispLen>=8?0.76:gDispLen>=7?0.83:gDispLen>=6?0.90:gDispLen>=5?0.95:1;
                            const gEffFs=Math.round(chFs*gLenScale);
                            const beatEl=(
                              <div key={beat.key}
                                onClick={editMode?(e)=>{e.stopPropagation();openGrandeMeasurePicker(si,mi,cSi,cMi,e,bi);}:undefined}
                                style={{flex:1,minWidth:0,overflow:'hidden',position:'relative',cursor:editMode?'pointer':'default'}}>
                                {hasVolta&&(
                                  <div style={{position:'absolute',top:0,left:0,right:0,height:VOLTA_H,
                                    borderLeft:`2.5px solid ${SIGN_ACCENT}`,borderTop:`2.5px solid ${SIGN_ACCENT}`,
                                    display:'flex',alignItems:'flex-start',paddingLeft:3,paddingTop:2,
                                    pointerEvents:'none',zIndex:2}}>
                                    <span style={{fontSize:10,fontWeight:900,color:SIGN_ACCENT,lineHeight:1,fontStyle:'italic'}}>{beat.v}.</span>
                                  </div>
                                )}
                                {hasChord&&(
                                  <span style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',
                                    background:degreeMode&&!isDia&&!spec&&!idem?'#F5DDD8':'transparent',
                                    borderRadius:3,lineHeight:1,display:'inline-flex',alignItems:'center'}}>
                                    {spec?(<span style={{fontSize:gEffFs,fontWeight:700,color:chColor,letterSpacing:'0.05em',lineHeight:1}}>{disp}</span>)
                                    :idem?(<span style={{fontSize:Math.round(gEffFs*1.05),fontWeight:400,fontStyle:'italic',color:chColor,letterSpacing:'0.06em',lineHeight:1,fontFamily:CHORD_FONT}}>%</span>)
                                    :degreeMode?(<DegreeText deg={disp} fs={gEffFs} color={chColor} weight={500}/>)
                                    :(<ChordText chord={disp} fs={gEffFs} color={chColor} weight={600}/>)}
                                  </span>
                                )}
                                {!hasChord&&editMode&&<span style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',fontSize:9,color:'#D8D4CE',lineHeight:1,userSelect:'none'}}>·</span>}
                                {hasText&&(
                                  <div style={{position:'absolute',top:hasVolta?VOLTA_H+2:3,left:0,right:0,
                                    textAlign:'center',fontSize:7,fontStyle:'italic',
                                    fontWeight:400,fontFamily:"Georgia,'Times New Roman',serif",
                                    color:'#9A7050',lineHeight:1.2,
                                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                                    pointerEvents:'none',zIndex:2}}>
                                    {beat.t}
                                  </div>
                                )}
                              </div>
                            );
                            // Séparateur central de 20px entre beat 3 et beat 4
                            if(bi===4){
                              return[
                                <div key="gm-sep"
                                  style={{width:20,flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center',cursor:editMode?'pointer':'default'}}
                                  onClick={editMode?(e)=>{e.stopPropagation();setBarlinePick({si,mi,side:'right'});}:undefined}>
                                  {editMode&&<div style={{width:0,alignSelf:'stretch',borderLeft:`1.5px dashed ${isDark?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.18)'}`}}/>}
                                </div>,
                                beatEl
                              ];
                            }
                            return[beatEl];
                          })}
                        </div>
                        {/* Spacer : compense la barline 'none' disparue pour aligner les rows */}
                        <div style={{width:10,flexShrink:0}}/>
                        <Barline type={cMm.barAfter||'normal'}
                          onClick={editMode?(e)=>{e.stopPropagation();setBarlinePick({si:cSi,mi:cMi,side:'right'});}:undefined}
                          minH={barH} accentColor={INK_ACCENT} dotsColor={SIGN_ACCENT}/>
                      </React.Fragment>
                    );
                    return;
                  }

                  // ── Mesure normale ─────────────────────────────────────────────
                  const isSplit=!!measure.split2;
                  if(isContinuation){
                    const isSplitCont=!!measure.split2;
                    rendered.push(
                      <React.Fragment key={`${si}-${mi}`}>
                        <div style={{flex:1,position:'relative',display:'flex',flexDirection:'row',
                          minWidth:0,overflow:'hidden'}}>
                          {measure.timeSig&&(
                            <div style={{position:'absolute',top:3,right:4,zIndex:6,
                              background:isDark?'#2A1A40':'#EDE0FF',color:isDark?'#C8A8FF':'#5A2A9A',
                              borderRadius:3,fontSize:7,fontWeight:900,padding:'1px 5px',lineHeight:1.5,
                              letterSpacing:0.3,pointerEvents:'none'}}>
                              {measure.timeSig}
                            </div>
                          )}

                          {isSplitCont?(
                            <>
                              {renderHalf(measure,'a',si,mi,num)}
                              <div style={{width:1.5,background:INK_ACCENT,flexShrink:0,alignSelf:'stretch'}}/>
                              {renderHalf(measure,'b',si,mi,null)}
                            </>
                          ):(
                            renderHalf(measure,'a',si,mi,num)
                          )}
                        </div>
                        <Barline type={measure.barAfter||'normal'}
                          onClick={editMode?(e)=>{e.stopPropagation();setBarlinePick({si,mi,side:'right'});}:undefined}
                          minH={barH} accentColor={INK_ACCENT} dotsColor={SIGN_ACCENT}/>
                      </React.Fragment>
                    );
                    return;
                  }
                  rendered.push(
                    <React.Fragment key={`${si}-${mi}`}>
                      <div style={{flex:1,position:'relative',display:'flex',flexDirection:'row',
                        minWidth:0,overflow:'hidden'}}>
                        {/* Badge nom de section — première mesure de chaque section */}
                        {sectionStart&&sectionName&&(
                          <div style={{position:'absolute',top:4,left:ci===0?6:4,zIndex:7,
                            background:isDark?'rgba(100,55,15,0.88)':'rgba(148,72,18,0.82)',
                            color:isDark?'#FFD4A0':'#FFE8C8',borderRadius:4,
                            fontSize:10,fontWeight:800,padding:'2px 7px',lineHeight:1.4,
                            letterSpacing:1.0,textTransform:'uppercase',
                            pointerEvents:'none',whiteSpace:'nowrap',
                            maxWidth:'55%',overflow:'hidden',textOverflow:'ellipsis'}}>
                            {sectionName}
                          </div>
                        )}
                        {measure.label&&(
                          <div style={{position:'absolute',top:3,left:ci===0?28:4,zIndex:6,
                            background:isDark?'#2A1A08':'#C47830',color:isDark?'#FFD090':'#FFF0D8',borderRadius:3,
                            fontSize:7,fontWeight:900,padding:'1px 5px',lineHeight:1.5,
                            letterSpacing:0.5,pointerEvents:'none'}}>
                            {measure.label}
                          </div>
                        )}
                        {editMode&&measure.rowSpacer&&(
                          <div style={{position:'absolute',top:2,right:4,zIndex:8,
                            color:'#B0A898',fontSize:9,pointerEvents:'none',lineHeight:1,
                            fontWeight:700}}>⇕{measure.rowSpacer===1?'S':measure.rowSpacer===2?'M':'L'}</div>
                        )}
                        {measure.timeSig&&(
                          <div style={{position:'absolute',top:3,right:4,zIndex:6,
                            background:isDark?'#2A1A40':'#EDE0FF',color:isDark?'#C8A8FF':'#5A2A9A',
                            borderRadius:3,fontSize:7,fontWeight:900,padding:'1px 5px',lineHeight:1.5,
                            letterSpacing:0.3,pointerEvents:'none'}}>
                            {measure.timeSig}
                          </div>
                        )}

                        {isSplit?(
                          <>
                            {renderHalf(measure,'a',si,mi,num)}
                            <div style={{width:1.5,background:INK_ACCENT,flexShrink:0,alignSelf:'stretch'}}/>
                            {renderHalf(measure,'b',si,mi,null)}
                          </>
                        ):(
                          renderHalf(measure,'a',si,mi,num)
                        )}
                      </div>
                      <Barline type={isMaster?'none':(measure.barAfter||'normal')}
                        onClick={editMode?(e)=>{e.stopPropagation();setBarlinePick({si,mi,side:'right'});}:undefined}
                        minH={barH} accentColor={INK_ACCENT} dotsColor={SIGN_ACCENT}/>
                    </React.Fragment>
                  );
                });
                return rendered;
              })()}
              {/* Cellules vides fin de ligne — première = bouton "+" si fin de section */}
              {row.cells.length<GCOLS&&Array.from({length:GCOLS-row.cells.length}).map((_,pi)=>(
                <React.Fragment key={`pad${pi}`}>
                  {pi===0&&isLastOfSection?(
                    <div style={{flex:1,minHeight:barH,minWidth:0,overflow:'hidden',position:'relative'}}>
                      <button onClick={()=>{addMeasureAtEnd(lastRealSi);setCurrentPage(Math.ceil((allRows.length+1)/rowsPerPage)-1);}}
                        style={{position:'absolute',left:14,top:'50%',transform:'translateY(-50%)',
                          width:26,height:26,background:'rgba(0,0,0,0.06)',border:'none',borderRadius:'50%',
                          fontSize:18,cursor:'pointer',color:'#8A847C',display:'flex',alignItems:'center',
                          justifyContent:'center',fontWeight:300,padding:0,lineHeight:1}}>+</button>
                    </div>
                  ):(
                    <div style={{flex:1,minHeight:barH,minWidth:0,overflow:'hidden'}}/>
                  )}
                  <Barline type="none" minH={barH} accentColor={INK_ACCENT} dotsColor={SIGN_ACCENT}/>
                </React.Fragment>
              ))}
            </div>
          );
        })}
        {/* Lignes vides pour remplir la page */}
        {Array.from({length:Math.max(0,rowsPerPage-pageRows.length)}).map((_,ei)=>{
          const addSiFiller=ei===0&&editMode?pageRows._addSiForFiller:null;
          return(
          <div key={`e${ei}`} style={{height:rowH,flexShrink:0,display:'flex',alignItems:'stretch',
            background:TH.fillerBg,
            paddingTop:ROW_PAD,paddingBottom:ROW_PAD}}>
            <div style={{width:10,flexShrink:0}}/>
            {Array.from({length:GCOLS}).map((_,ci)=>(
              <React.Fragment key={ci}>
                {ci===0&&addSiFiller!=null?(
                  <div style={{flex:1,minWidth:0,overflow:'hidden',position:'relative'}}>
                    <button onClick={()=>{addMeasureAtEnd(addSiFiller);setCurrentPage(Math.ceil((allRows.length+1)/rowsPerPage)-1);}}
                      style={{position:'absolute',left:42,top:'50%',transform:'translateY(-50%)',
                        width:26,height:26,background:'rgba(0,0,0,0.06)',border:'none',borderRadius:'50%',
                        fontSize:18,cursor:'pointer',color:'#8A847C',display:'flex',alignItems:'center',
                        justifyContent:'center',fontWeight:300,padding:0,lineHeight:1}}>+</button>
                  </div>
                ):(
                  <div style={{flex:1,minWidth:0,overflow:'hidden'}}/>
                )}

      {picker.visible&&picker.isGrande&&<ChordPicker picker={picker}

          // Synchronise localBeats[selectedBeat].c avec l'état de l'éditeur (root/quality/ext/bass)
          const prevSbi=picker.selectedBeat??0;

          const emptyBeats=Array.from({length:nSlots},()=>mkBeat());
          if(sbi===prevSbi){
            const root=upd.letter+(upd.acc==='#'?'#':upd.acc==='b'?'b':'');
            const bass=(upd.bass||'')+((upd.bass&&upd.bassAcc)?upd.bassAcc:'');
            const newChord=buildChordStr(root,upd.qualityId,upd.extensions,bass);
            const newBeats=(upd.localBeats||emptyBeats).map((b,i)=>{
              if(i!==sbi)return b;
              if(isSpec(b.c))return b;
              return{...b,c:newChord};
            });
            setPicker({...upd,localBeats:newBeats});
          } else {
            setPicker({...upd});

        }}
        onConfirm={confirmMeasure}

      {/* ── Compact ChordPicker flottant (Option B) ── */}
      {editMode&&picker.visible&&!picker.isGrande&&(()=>{
        const sbi=picker.selectedBeat??0;
        const bassStr=(picker.bass||'')+((picker.bass&&picker.bassAcc)?picker.bassAcc:'');
        const selBeat=(picker.localBeats||[])[sbi]||mkBeat();
        const curVolta=selBeat.v??null;
        const curSigns=selBeat.s||[];
        const curText=selBeat.t||'';
        const isCustomVolta=curVolta!==null&&!['1','2','3'].includes(curVolta);
        const cpkSub=picker.cpkSub||null;
        const cpkTab=picker.cpkTab||'accord';
        // ── Helpers ────────────────────────────────────────────────────────────
        function getRoot(){return picker.letter+(picker.acc==='#'?'#':picker.acc==='b'?'b':'');}
        function getBass(){return (picker.bass||'')+((picker.bass&&picker.bassAcc)?picker.bassAcc:'');}
        function pushChord(np){setPicker(np);applyMeasureLive(np);}
        function cpkNote(newL,newA){
          const useAH=prefs?.autoHarmonize;
          const isLetterChange=newL!==picker.letter;
          const finalAcc=(useAH&&isLetterChange)?scaleAccForLetter(newL,displayKey,displayMode):newA;
          const harmony=useAH?autoHarmonizeTriad(newL,finalAcc,displayKey,displayMode):{};
          const newQualId=harmony.qualityId||picker.qualityId;
          const newExts=(useAH&&isLetterChange)?(harmony.extensions||[]):(picker.extensions||[]);
          const chord=buildChordStr(newL+(finalAcc==='#'?'#':finalAcc==='b'?'b':''),newQualId,newExts,getBass());
          const nb=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,c:chord});
          pushChord({...picker,letter:newL,acc:finalAcc,qualityId:newQualId,extensions:newExts,localBeats:nb});
        }
        function cpkQual(qid){
          const chord=buildChordStr(getRoot(),qid,picker.extensions||[],getBass());
          const nb=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,c:chord});
          pushChord({...picker,qualityId:qid,localBeats:nb});
        }
        function cpkExt(eid){
          const exts=picker.extensions||[];
          const newExts=exts.includes(eid)?exts.filter(x=>x!==eid):[...exts,eid];
          const chord=buildChordStr(getRoot(),picker.qualityId,newExts,getBass());
          const nb=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,c:chord});
          pushChord({...picker,extensions:newExts,localBeats:nb});
        }
        function cpkClearExt(){
          const chord=buildChordStr(getRoot(),picker.qualityId,[],getBass());
          const nb=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,c:chord});
          pushChord({...picker,extensions:[],localBeats:nb});
        }
        function cpkBassNote(newBL){
          const newBass=picker.bass===newBL?'':newBL;
          const newBassAcc=picker.bass===newBL?'':picker.bassAcc||'';
          const newBStr=newBass+(newBassAcc==='#'?'#':newBassAcc==='b'?'b':'');
          const chord=buildChordStr(getRoot(),picker.qualityId,picker.extensions||[],newBStr);
          const nb=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,c:chord});
          pushChord({...picker,bass:newBass,bassAcc:newBassAcc,localBeats:nb});
        }
        function cpkBassAcc(newBA){
          const newBStr=(picker.bass||'')+(newBA==='#'?'#':newBA==='b'?'b':'');
          const chord=buildChordStr(getRoot(),picker.qualityId,picker.extensions||[],newBStr);
          const nb=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,c:chord});
          pushChord({...picker,bassAcc:newBA,localBeats:nb});
        }
        function cpkBeat(bi){
          const initChord=(picker.localBeats||[])[bi]?.c||'';
          const fc=(initChord&&!isSpec(initChord))?initChord:'C';
          const parsed=parseChordFull(fc);
          const{letter:nl,acc:na}=rootToLetterAcc(parsed.root);
          const bR=parsed.bass||'';
          const{letter:bL,acc:bA}=bR?rootToLetterAcc(bR):{letter:'',acc:''};
          setPicker(pk=>({...pk,selectedBeat:bi,letter:nl,acc:na,
            qualityId:parsed.qualityId,extensions:parsed.extensions,bass:bL,bassAcc:bA}));
        }
        function cpkUpdBeat(partial){
          const nb=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,...partial});
          const np={...picker,localBeats:nb};
          setPicker(np);applyMeasureLive(np);
        }
        function cpkToggleSub(s){setPicker(pk=>({...pk,cpkSub:pk.cpkSub===s?null:s}));}
        const pieceTs=cur.timeSig||'4/4';
        const TS_BEATS_MAP={'2/4':2,'3/4':3,'4/4':4,'5/4':5,'6/8':6,'7/8':7,'12/8':12};
        function cpkSetTimeSig(ts){
          const n=TS_BEATS_MAP[ts]||4;
          const bl=picker.localBeats||[];
          const newBeats=n>bl.length
            ?[...bl,...Array.from({length:n-bl.length},()=>mkBeat())]
            :bl.slice(0,n);
          const newTs=ts===pieceTs?null:ts;
          const np={...picker,localBeats:newBeats,timeSig:newTs,
            selectedBeat:Math.min(picker.selectedBeat||0,n-1),cpkSub:null};
          setPicker(np);applyMeasureLive(np);
        }
        // ── Constantes ─────────────────────────────────────────────────────────
        // ── 2-step quality: base → septième ────────────────────────────────────
        const CQ2BASE={
          'maj':'maj','dom7':'maj','maj7':'maj','maj6':'maj',
          'min':'min','min7':'min','mMaj7':'min','min6':'min',
          'dim':'dim','hdim':'dim','dim7':'dim',
          'aug':'aug','sus4':'sus4','sus2':'sus2','5':'5',
        };
        const cqBase=CQ2BASE[picker.qualityId]||'maj';
        const CSEVENTH={
          'maj':[{id:'none',lbl:'—'},{id:'dom7',lbl:'7'},{id:'maj7',lbl:'Δ'},{id:'maj6',lbl:'6'}],
          'min':[{id:'none',lbl:'—'},{id:'min7',lbl:'7'},{id:'mMaj7',lbl:prefs?.minor==='-'?'−Δ':'mΔ'},{id:'min6',lbl:'6'}],
          'dim':[{id:'none',lbl:'—'},{id:'hdim',lbl:'ø'},{id:'dim7',lbl:'°7'}],
          'aug':[{id:'none',lbl:'—'},{id:'dom7',lbl:'7'},{id:'maj7',lbl:'Δ'}],
          'sus4':[{id:'none',lbl:'—'},{id:'dom7',lbl:'7'}],
          'sus2':[{id:'none',lbl:'—'}],
          '5':[{id:'none',lbl:'—'}],
        };
        const cSeventhOpts=CSEVENTH[cqBase]||[{id:'none',lbl:'—'}];
        const B={cursor:'pointer',fontFamily:'inherit',border:'none',padding:0,
          display:'flex',alignItems:'center',justifyContent:'center'};
        const AC=isDark?'#F2EDE4':'#1A1A1A';
        const ACtxt=isDark?'#1A1A1A':'#F2EDE4';
        const IC=isDark?'#F2EDE4':'#1A1A1A';
        const BC=isDark?'#3A3634':'#C0BAB0';

        const CRYTHME=isDark?'#7AACDC':'#3A6A9A';
        const CHARM  =isDark?'#B090E0':'#6040B0';
        const CANNOT =isDark?'#6ABE8A':'#2A7A56';

        const LBL=(t,clr)=>(
          <div style={{fontSize:9,fontWeight:900,color:clr||BC,textTransform:'uppercase',

            <div style={{
              padding:'4px 16px',margin:'0 0',
              background:isDark?`${clr}18`:`${clr}12`,
              border:`1px solid ${clr}40`,borderRadius:20,
              fontSize:9,fontWeight:900,color:clr,
              textTransform:'uppercase',letterSpacing:2,whiteSpace:'nowrap'}}>
              {label}
            </div>
            <div style={{flex:1,height:1,background:`${clr}30`}}/>
          </div>
        );
        // Bouton accordéon (basse, extensions)
        const AccordBtn=(key,label,hasContent,accentClr)=>(
          <button onClick={()=>cpkToggleSub(key)}
            style={{...B,width:'100%',height:36,borderRadius:9,padding:'0 14px',
              justifyContent:'space-between',fontSize:12,fontWeight:700,
              background:hasSub(key)?(isDark?`${accentClr}22`:`${accentClr}14`):'transparent',
              color:hasContent?accentClr:IC,
              outline:`1.5px solid ${hasSub(key)||hasContent?accentClr:BC}`}}>
            <span>{label}</span>
            <span style={{fontSize:9,opacity:0.7}}>{hasSub(key)?'▲':'▼'}</span>
          </button>
        );
        const noteBtn=(l,active,onClick,accentClr)=>(
          <button key={l} onClick={onClick}
            style={{...B,width:36,height:36,borderRadius:9,fontSize:16,fontWeight:800,
              background:active?(accentClr||AC):'transparent',
              color:active?(accentClr?'#1A1A1A':ACtxt):IC,
              outline:`2px solid ${active?(accentClr||AC):BC}`,flexShrink:0}}>
            {l}
          </button>
        );
        const dispChord=getRoot()?applyPrefs(buildChordStr(getRoot(),picker.qualityId,picker.extensions||[],getBass()),prefs):'—';
        const hasSub=(s)=>cpkSub===s;
        const subTabStyle=(s)=>({...B,height:34,borderRadius:8,padding:'0 11px',fontSize:12,fontWeight:700,
          background:hasSub(s)?CANNOT:'transparent',
          color:hasSub(s)?'#F2EDE4':IC,outline:`1.5px solid ${hasSub(s)?CANNOT:BC}`,
          flexShrink:0,whiteSpace:'nowrap'});
        // ── Render ──────────────────────────────────────────────────────────────
        return(
          <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:150,
            background:isDark?'rgba(22,20,18,0.98)':'rgba(252,250,247,0.98)',
            backdropFilter:'blur(22px)',WebkitBackdropFilter:'blur(22px)',
            borderRadius:'18px 18px 0 0',padding:'14px 14px 24px',
            boxShadow:isDark?'0 -6px 32px rgba(0,0,0,0.5)':'0 -6px 32px rgba(0,0,0,0.12)',
            maxHeight:'88vh',overflowY:'auto'}}>

            {/* ── En-tête : accord + fermer ── */}
            <div style={{display:'flex',alignItems:'center',marginBottom:12}}>
              <span style={{fontSize:30,fontWeight:900,color:AC,letterSpacing:'-0.5px',flex:1,lineHeight:1}}>
                {dispChord}
              </span>
              <button onClick={()=>setPicker(pk=>({...pk,visible:false,cpkSub:null}))}
                style={{...B,width:32,height:32,borderRadius:'50%',fontSize:16,fontWeight:700,
                  background:isDark?'#3A3634':'#E0DAD4',color:AC,flexShrink:0}}>✕</button>
            </div>

            {/* ── Sélecteur d'onglets ── */}
            <div style={{display:'flex',gap:4,marginBottom:14,
              background:isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.05)',
              borderRadius:12,padding:3}}>
              {[{id:'accord',lbl:'♪ Accord'},{id:'details',lbl:'＋ Détails'}].map(tab=>(
                <button key={tab.id}
                  onClick={()=>setPicker(pk=>({...pk,cpkTab:tab.id,cpkSub:null}))}
                  style={{...B,flex:1,height:34,borderRadius:9,fontSize:13,fontWeight:800,
                    background:cpkTab===tab.id?(isDark?'#3A3634':'#F2EDE4'):'transparent',
