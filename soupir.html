  <style>

<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

// ─── MUSIC ENGINE ─────────────────────────────────────────────────────────────
const SHARP=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const FLAT=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const FLAT_KEYS=['F','Bb','Eb','Ab','Db','Gb'];
const MAJOR_IV=[0,2,4,5,7,9,11];
const DEG_LBL=['I','II','III','IV','V','VI','VII'];
const DEG_QUAL=['maj7','m7','m7','maj7','7','m7','m7b5'];
const ALL_KEYS=['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];
const LETTERS=['A','B','C','D','E','F','G'];
const MINOR_IV=[0,2,3,5,7,8,10];
const MINOR_DEG_QUAL=['m7','m7b5','maj7','m7','m7','maj7','7'];
const MINOR_DEG_LBL=['i','ii°','III','iv','v','VI','VII'];

const QUALITIES=[
  {id:'maj',suffix:'',group:'Triades'},{id:'min',suffix:'m',group:'Triades'},
  {id:'dim',suffix:'dim',group:'Triades'},{id:'aug',suffix:'aug',group:'Triades'},
  {id:'sus4',suffix:'sus4',group:'Triades'},{id:'sus2',suffix:'sus2',group:'Triades'},
  {id:'dom7',suffix:'7',group:'Septièmes'},{id:'maj7',suffix:'maj7',group:'Septièmes'},
  {id:'min7',suffix:'m7',group:'Septièmes'},{id:'mMaj7',suffix:'mMaj7',group:'Septièmes'},
  {id:'hdim',suffix:'m7b5',group:'Septièmes'},{id:'dim7',suffix:'dim7',group:'Septièmes'},
  {id:'maj6',suffix:'6',group:'Autres'},{id:'min6',suffix:'m6',group:'Autres'},
  {id:'5',suffix:'5',group:'Autres'},
];
const EXTENSIONS=[
  {id:'n9',label:'9',suffix:'9'},{id:'b9',label:'♭9',suffix:'b9'},
  {id:'s9',label:'♯9',suffix:'#9'},{id:'n11',label:'11',suffix:'11'},
  {id:'s11',label:'♯11',suffix:'#11'},{id:'n13',label:'13',suffix:'13'},
  {id:'b13',label:'♭13',suffix:'b13'},{id:'b5',label:'♭5',suffix:'b5'},
  {id:'s5',label:'♯5',suffix:'#5'},{id:'add9',label:'add9',suffix:'add9'},
];

function noteIdx(n){let i=SHARP.indexOf(n);return i!==-1?i:FLAT.indexOf(n);}
function transNote(n,s,f){const i=noteIdx(n);if(i===-1)return n;const ni=((i+s)%12+12)%12;return f?FLAT[ni]:SHARP[ni];}
function parseRoot(c){const m=c&&c.match(/^([A-G][b#]?)/);return m?m[1]:null;}
function transChord(c,s,f){if(!c||c==='—'||c==='%'||c==='/')return c;const r=parseRoot(c);if(!r)return c;const rest=c.slice(r.length);const bi=rest.lastIndexOf('/');if(bi>=0){const bassR=parseRoot(rest.slice(bi+1));if(bassR)return transNote(r,s,f)+rest.slice(0,bi+1)+transNote(bassR,s,f)+rest.slice(bi+1+bassR.length);}return transNote(r,s,f)+rest;}
function buildScale(key,mode='maj'){const f=FLAT_KEYS.includes(key);const ivs=mode==='min'?MINOR_IV:MAJOR_IV;const quals=mode==='min'?MINOR_DEG_QUAL:DEG_QUAL;const lbls=mode==='min'?MINOR_DEG_LBL:DEG_LBL;return ivs.map((iv,i)=>{const ni=((noteIdx(key)+iv)%12+12)%12;const note=f?FLAT[ni]:SHARP[ni];return{degree:lbls[i],note,quality:quals[i]};});}
function chordToDeg(chord,key){const r=parseRoot(chord);if(!r)return null;const ci=noteIdx(r),ki=noteIdx(key);if(ci===-1||ki===-1)return null;const iv=((ci-ki)%12+12)%12;const di=MAJOR_IV.indexOf(iv);return di===-1?null:DEG_LBL[di]+chord.slice(r.length);}
function parseChordFull(chord){
  if(!chord)return{root:'',qualityId:'maj',extensions:[],bass:''};
  // Basse seule : "/G" → root='', bass='G'
  if(chord.startsWith('/')){return{root:'',qualityId:'maj',extensions:[],bass:chord.slice(1)};}
  // Extraire la note de basse (ex: "G/B" → main="G", bass="B")
  const si=chord.lastIndexOf('/');let bass='',main=chord;
  if(si>0){bass=chord.slice(si+1);main=chord.slice(0,si);}
  const r=parseRoot(main);if(!r)return{root:'',qualityId:'maj',extensions:[],bass};
  const rest=main.slice(r.length);
  const sorted=[...QUALITIES].sort((a,b)=>b.suffix.length-a.suffix.length);
  let qualityId='maj',extStr=rest;
  for(const q of sorted){if(rest.startsWith(q.suffix)&&(q.suffix!==''||rest==='')){qualityId=q.id;extStr=rest.slice(q.suffix.length);break;}}
  return{root:r,qualityId,extensions:EXTENSIONS.filter(e=>extStr.includes(e.suffix)).map(e=>e.id),bass};
}
function buildChordStr(root,qualityId,extensions,bass=''){
  // Basse seule
  if(!root)return bass?'/'+bass:'';
  const q=QUALITIES.find(q=>q.id===qualityId);
  const base=root+(q?q.suffix:'')+EXTENSIONS.filter(e=>extensions.includes(e.id)).map(e=>e.suffix).join('');
  return bass?base+'/'+bass:base;
}
function rootToLetterAcc(root){
  // root vide → lettre vide (basse seule, pas de fondamentale)
  if(!root||root.length===0)return{letter:'',acc:''};
  return{letter:root[0],acc:root.length>1?root[1]:''};
}

// Retourne l'altération correcte ('' | '#' | 'b') pour une lettre dans la gamme courante
// Ex : scaleAccForLetter('B','F','maj') → 'b'  (Fa majeur = Sib)
function scaleAccForLetter(letter,key,mode='maj'){
  const scale=buildScale(key,mode);
  const tone=scale.find(s=>s.note[0]===letter);
  if(!tone)return '';
  return tone.note.length>1?tone.note[1]:'';
}

function autoHarmonizeTriad(letter,acc,key,mode='maj'){
  const noteStr=letter+(acc==='#'?'#':acc==='b'?'b':'');
  const ni=noteIdx(noteStr);
  const ki=noteIdx(key);
  if(ni===-1||ki===-1)return{qualityId:'maj',extensions:[]};
  const semis=((ni-ki)%12+12)%12;
  const DIA_MAJ={0:'maj',2:'min',4:'min',5:'maj',7:'maj',9:'min',11:'dim'};
  const DIA_MIN={0:'min',2:'dim',3:'maj',5:'min',7:'min',8:'maj',10:'maj'};
  const map=mode==='min'?DIA_MIN:DIA_MAJ;
  return{qualityId:map[semis]||'maj',extensions:[]};
}

// ─── PREFS SYSTEM ─────────────────────────────────────────────────────────────
const DEFAULT_PREFS={minor:'m',dim:'°',aug:'+',maj7:'maj7',hdim:'ø',accentColor:'black',autoHarmonize:true,darkMode:false};
function loadPrefs(){try{const s=localStorage.getItem('soupir_prefs');return s?{...DEFAULT_PREFS,...JSON.parse(s)}:DEFAULT_PREFS;}catch{return DEFAULT_PREFS;}}
function savePrefs(p){try{localStorage.setItem('soupir_prefs',JSON.stringify(p));}catch{}}
function applyPrefs(chord,prefs){
  if(!chord||chord==='%'||chord==='/'||chord==='—')return chord;
  // Extraire la note de basse avant d'appliquer les préférences
  const si=chord.lastIndexOf('/');let bassStr='',main=chord;
  if(si>0){bassStr='/'+chord.slice(si+1);main=chord.slice(0,si);}
  const root=parseRoot(main);if(!root)return chord;
  const p=prefs||DEFAULT_PREFS;
  let rest=main.slice(root.length);
  if(rest.startsWith('m7b5')){rest=(p.hdim==='ø'?'ø':'m7b5')+rest.slice(4);}
  else if(rest.startsWith('mMaj7')){rest=(p.minor==='-'?'-':'m')+'Δ'+rest.slice(5);}
  else if(rest.startsWith('maj7')){rest=(p.maj7==='Δ'?'Δ':'maj7')+rest.slice(4);}
  else if(rest.startsWith('dim7')){rest=(p.dim==='°'?'°7':'dim7')+rest.slice(4);}
  else if(rest.startsWith('dim')){rest=(p.dim==='°'?'°':'dim')+rest.slice(3);}
  else if(rest.startsWith('aug')){rest=(p.aug==='+'?'+':'aug')+rest.slice(3);}
  else if(rest.startsWith('m')&&!rest.startsWith('maj')){rest=(p.minor==='-'?'-':'m')+rest.slice(1);}
  return root+rest+bassStr;
}

// ─── VERSION ──────────────────────────────────────────────────────────────────
const APP_VERSION='1.99';
const CHORD_FONT="'Barlow Semi Condensed','Barlow Condensed',sans-serif";

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const BAR_TYPES=[
  {id:'none',label:'□',hint:'Pas de barre (grande mesure)'},
  {id:'normal',label:'|',hint:'Barre simple'},
  {id:'double',label:'||',hint:'Double barre'},
  {id:'repeat-start',label:'|:',hint:'Début de reprise'},
  {id:'repeat-end',label:':|',hint:'Fin de reprise'},
  {id:'repeat-end-start',label:':|:',hint:'Reprise enchaînée'},
  {id:'final',label:'|]',hint:'Fin de morceau'},
];
const SIGN_TYPES=[
  {id:'coda',   sym:'⊕',    label:'⊕ Coda'},
  {id:'segno',  sym:'𝄋',   label:'𝄋 Segno'},
  {id:'toCoda', sym:'To ⊕', label:'To ⊕'},
  {id:'dc',     sym:'D.C.', label:'D.C.'},
  {id:'ds',     sym:'D.S.', label:'D.S.'},
  {id:'fine',   sym:'Fine', label:'Fine'},
];
const TEXT_SUGG=['D.S. al Coda','D.S. al Fine','Fine','D.C. al Coda','D.C. al Fine'];
const TIME_SIGS=['2/4','3/4','4/4','5/4','6/8','7/8','12/8'];
function getBeatsInEighths(ts){const m={'2/4':4,'3/4':6,'4/4':8,'5/4':10,'6/8':6,'7/8':7,'12/8':12};return m[ts]||8;}
const KEY_SIG={'C':{t:'s',n:0},'G':{t:'s',n:1},'D':{t:'s',n:2},'A':{t:'s',n:3},
  'E':{t:'s',n:4},'B':{t:'s',n:5},'F#':{t:'s',n:6},'C#':{t:'s',n:7},
  'F':{t:'f',n:1},'Bb':{t:'f',n:2},'Eb':{t:'f',n:3},'Ab':{t:'f',n:4},'Db':{t:'f',n:5},'Gb':{t:'f',n:6}};
const SHP_Y=[30,45,25,40,55,35,50],FLT_Y=[50,35,55,40,60,45,65];

// ─── DATA ─────────────────────────────────────────────────────────────────────
const mkSplit2=(chords,signs=[],volta=null,text='')=>({chords,signs,volta:volta||null,text:text||''});
const mk=(chords,barAfter='normal',signs=[],volta=null,text='',split2=null)=>
  ({chords,barAfter,signs,volta:volta||null,text:text||'',split2:split2||null});

// ─── MODÈLE BEATS (v22) ───────────────────────────────────────────────────────
// Un "beat" = un temps de la mesure : {c: accord, s: signes[], v: volta, t: texte}
const mkBeat=(c='',s=[],v=null,t='')=>({c,s:[...s],v:v||null,t:t||''});
// Retourne les 4 beats d'une mesure (migration auto depuis l'ancien format)
function getBeats(mm){
  if(!mm)return[mkBeat(),mkBeat(),mkBeat(),mkBeat()];
  if(mm.beats)return mm.beats.map(b=>b?{c:b.c||'',s:b.s||[],v:b.v||null,t:b.t||''}:mkBeat());
  // Migration : ancien format {chords:[], signs:[], volta, text}
  const b=[mkBeat(),mkBeat(),mkBeat(),mkBeat()];
  const old=mm.chords||[''];const n=Math.min(old.length,4);
  const pos=({1:[0],2:[0,2],3:[0,1,2],4:[0,1,2,3]})[n]||[0];
  pos.forEach((bi,i)=>{if(i<n)b[bi].c=old[i]||'';});
  const fi=pos[0];b[fi].s=mm.signs||[];b[fi].v=mm.volta||null;b[fi].t=mm.text||'';
  return b;
}

// ─── STAFF SECTION FACTORIES ──────────────────────────────────────────────────
const NOTE_BEATS_G={whole:8,half:4,quarter:2,eighth:1};
function staffNextBeat(notes){return notes.reduce((s,n)=>s+(NOTE_BEATS_G[n.value]||2),0);}
function staffIsFull(notes,ts){return staffNextBeat(notes)>=getBeatsInEighths(ts||'4/4');}
function staffRemBeats(notes,ts){return getBeatsInEighths(ts||'4/4')-staffNextBeat(notes);}
const mkStaffMeasure=()=>({notes:[],annotations:[]});
const mkStaffSection=(name='Portée',timeSig='4/4',clef='treble',key='C')=>({
  type:'staff',name,timeSig,clef,key,
  measures:Array.from({length:4},()=>mkStaffMeasure()),
});

// ─── TAB SECTION FACTORIES ────────────────────────────────────────────────────
const TAB_STR={guitar:['e','B','G','D','A','E'],bass:['G','D','A','E']};
const mkTabBeat=(n)=>({strings:Array(n).fill(null),duration:'quarter',dotted:false});
const mkTabMeasure=(n)=>({beats:Array.from({length:4},()=>mkTabBeat(n)),barAfter:'normal'});
const mkTabSection=(name='Tablature',instrument='guitar')=>{
  const n=instrument==='bass'?4:6;
  return{type:'tab',name,instrument,measures:Array.from({length:4},()=>mkTabMeasure(n))};
};

const LIBRARY_INIT=[];

// ─── LOGO ─────────────────────────────────────────────────────────────────────
function SoupirLogo({size=90,color='#1A1A1A'}){
  return(<svg width={size} height={size*1.6} viewBox="0 0 80 128" fill="none">
    <path d="M52 6 C64 12 58 26 46 32 C32 38 28 52 46 60 C62 68 60 86 46 96 C38 102 26 108 20 120"
      stroke={color} strokeWidth="5.5" strokeLinecap="round" fill="none"/>
    <path d="M46 96 C40 102 30 106 24 100 C20 96 22 90 28 88"
      stroke={color} strokeWidth="5" strokeLinecap="round" fill="none"/>
    <circle cx="52" cy="6" r="5" fill={color}/>
  </svg>);
}

// ─── BARLINE ─────────────────────────────────────────────────────────────────
function Barline({type='normal',onClick,minH=106,accentColor='#1A1A1A',dotsColor=null}){
  // type 'none' → largeur 0 (grande mesure = fusionner avec la suivante)
  // BW fixe 10px pour TOUS les types : pas de décalage en changeant le type.
  // Le contenu des barres de répétition (>10px) déborde en overflow:visible vers la gauche.
  const BW=type==='none'?0:10;
  const INK=accentColor;       // couleur des traits neutres (barres fines, finale)
  const DOTS=dotsColor||INK;   // couleur des éléments de répétition (rouge si préférence rouge)
  const isRepeat=type==='repeat-start'||type==='repeat-end'||type==='repeat-end-start';
  const RINK=isRepeat?DOTS:INK; // barre épaisse + crochets : rouge sur les reprises, neutre ailleurs
  const thin={width:1.5,alignSelf:'stretch',background:INK,flexShrink:0,borderRadius:0.5};
  const thick={width:isRepeat?3.5:3,alignSelf:'stretch',background:RINK,flexShrink:0,borderRadius:0.5};
  const sp=(w)=>({width:w,flexShrink:0});
  // Barre épaisse avec serlles horizontales en haut et en bas
  // dir='right' → vers la droite (repeat-start) ; 'left' → vers la gauche (repeat-end)
  const thickHook=(dir)=>(
    <div style={{position:'relative',overflow:'visible',...thick}}>
      <div style={{position:'absolute',...(dir==='right'?{left:0}:{right:0}),
        top:0,width:6,height:2,background:RINK,borderRadius:0.5}}/>
      <div style={{position:'absolute',...(dir==='right'?{left:0}:{right:0}),
        bottom:0,width:6,height:2,background:RINK,borderRadius:0.5}}/>
    </div>
  );
  const dots=(
    <div style={{display:'flex',flexDirection:'column',justifyContent:'center',
      gap:4,alignSelf:'center',width:3,flexShrink:0}}>
      <div style={{width:3,height:3,borderRadius:'50%',background:DOTS}}/>
      <div style={{width:3,height:3,borderRadius:'50%',background:DOTS}}/>
    </div>);
  if(type==='none'){
    return(<div className={onClick?'barline-hit':''} onClick={onClick}
      style={{width:10,flexShrink:0,alignSelf:'stretch',
        display:'flex',alignItems:'center',justifyContent:'center',
        cursor:onClick?'pointer':'default'}}>
      {onClick&&(<div style={{width:2,height:24,background:accentColor,borderRadius:1,opacity:0.35}}/>)}
    </div>);
  }
  let inner=null;
  switch(type){
    case 'normal':           inner=<div style={thin}/>;break;
    case 'double':           inner=<><div style={thin}/><div style={sp(2)}/><div style={thin}/></>;break;
    // repeat-start : |: — barre fine à gauche, épaisse avec crochets+points contenus à droite
    case 'repeat-start':     inner=<><div style={thin}/><div style={sp(2)}/>{thickHook('right')}<div style={sp(3)}/>{dots}</>;break;
    // repeat-end : :| — points+épaisse avec crochets à gauche, barre fine à droite
    case 'repeat-end':       inner=<>{dots}<div style={sp(3)}/>{thickHook('left')}<div style={sp(2)}/><div style={thin}/></>;break;
    case 'repeat-end-start': inner=<>{dots}<div style={sp(2)}/>{thickHook('left')}<div style={sp(1)}/>{thickHook('right')}<div style={sp(2)}/>{dots}</>;break;
    case 'final':            inner=<><div style={thin}/><div style={sp(2)}/><div style={{...thick,width:4}}/></>;break;
    default:                 inner=<div style={thin}/>;
  }
  return(
    <div className={onClick?'barline-hit':''}
      onClick={onClick}
      style={{width:BW,flexShrink:0,alignSelf:'stretch',overflow:'visible',
        display:'flex',alignItems:'stretch',justifyContent:'flex-end',
        cursor:onClick?'pointer':'default',transition:'opacity 0.1s'}}>
      <div style={{display:'flex',alignItems:'stretch'}}>{inner}</div>
    </div>);
}

// ─── SHEET WRAPPER ────────────────────────────────────────────────────────────
function Sheet({onClose,children}){
  return(<div className="sheet-bg"
    style={{position:'fixed',inset:0,background:'rgba(20,18,15,0.5)',zIndex:400,display:'flex',alignItems:'flex-end'}}
    onClick={onClose}>
    <div className="sheet-panel"
      style={{width:'100%',background:'#EDE8E0',borderRadius:'20px 20px 0 0',
        maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 -4px 40px rgba(0,0,0,0.2)'}}
      onClick={e=>e.stopPropagation()}>
      <div style={{display:'flex',justifyContent:'center',padding:'10px 0 0'}}>
        <div style={{width:36,height:4,background:'#C0BAB0',borderRadius:2}}/>
      </div>
      {children}
    </div>
  </div>);
}

// Accord spécial (répétition / silence / mesure répétée) — utilisé dans ChordPicker et EditorScreen
const isSpec=(c)=>c==='/'||c==='—'||c==='%';

// ─── CHORD PICKER — 4 beats + basse + signes + volta + annotation ─────────────
function ChordPicker({picker,onChange,onConfirm,onCancel,onStructure,sectionName,onRenameSection,prefs,displayKey,displayMode='maj',autoHarmonize}){
  const isGrande=!!picker.isGrande;
  const nSlots=isGrande?8:4;
  const localBeats=picker.localBeats||Array.from({length:nSlots},()=>mkBeat());
  const selectedBeat=picker.selectedBeat??0;
  const selBeat=localBeats[selectedBeat]||mkBeat();
  const isSelSpec=isSpec(selBeat.c);

  const root=picker.letter+(picker.acc==='#'?'#':picker.acc==='b'?'b':'');
  const bassStr=(picker.bass||'')+((picker.bass&&picker.bassAcc)?picker.bassAcc:'');
  const canonical=buildChordStr(root,picker.qualityId,picker.extensions,bassStr);
  const chord=applyPrefs(canonical,prefs);

  // Métadonnées du beat sélectionné
  const mText=selBeat.t||'';
  const signs=selBeat.s||[];
  const volta=selBeat.v;
  const isCustomVolta=volta!==null&&!['1','2','3'].includes(volta);
  const hasSign=signs.length>0;
  const hasVolta=volta!==null;
  const [subPanel,setSubPanel]=useState(null);
  const toggleSub=p=>setSubPanel(sp=>sp===p?null:p);

  // ── Actions sur les beats ────────────────────────────────────────────────────
  const selectBeat=(bi)=>{
    const b=localBeats[bi]||mkBeat();
    if(!b.c||isSpec(b.c)){
      onChange({...picker,selectedBeat:bi,letter:'C',acc:'',qualityId:'maj7',extensions:[],bass:'',bassAcc:''});
      return;
    }
    const parsed=parseChordFull(b.c);
    const{letter,acc}=rootToLetterAcc(parsed.root);
    const bR=parsed.bass||'';
    const{letter:bL,acc:bA}=bR?rootToLetterAcc(bR):{letter:'',acc:''};
    onChange({...picker,selectedBeat:bi,letter,acc,qualityId:parsed.qualityId,extensions:parsed.extensions,bass:bL,bassAcc:bA});
  };
  const deleteBeat=()=>{
    const nb=localBeats.map((b,i)=>i===selectedBeat?mkBeat():b);
    onChange({...picker,localBeats:nb,letter:'C',acc:'',qualityId:'maj7',extensions:[],bass:'',bassAcc:''});
  };
  // Met à jour les métadonnées du beat sélectionné
  const updBeat=(partial)=>onChange({...picker,localBeats:localBeats.map((b,i)=>i===selectedBeat?{...b,...partial}:b)});

  const pill=(active,col='#1A1A1A')=>({
    background:active?col:'transparent',color:active?'#F2EDE4':'#1A1A1A',
    border:`1.5px solid ${active?col:'#C0BAB0'}`,borderRadius:100,
    padding:'10px 0',fontWeight:700,fontSize:15,cursor:'pointer',
    transition:'all 0.1s',lineHeight:1,fontFamily:'inherit',textAlign:'center',
  });
  const smPill=(active,col='#1A1A1A')=>({
    background:active?col:'transparent',color:active?'#F2EDE4':'#1A1A1A',
    border:`1.5px solid ${active?col:'#C0BAB0'}`,borderRadius:100,
    padding:'8px 12px',fontWeight:700,fontSize:13,cursor:'pointer',
    transition:'all 0.1s',lineHeight:1,fontFamily:'inherit',
  });
  const secLbl=(t)=>(
    <div style={{fontSize:10,fontWeight:700,color:'#8A847C',textTransform:'uppercase',
      letterSpacing:1.4,marginBottom:8,marginTop:4}}>{t}</div>
  );

  // ── Qualité 2 étapes (base → septième) ─────────────────────────────────────
  const Q2BASE={'maj':'maj','dom7':'maj','maj7':'maj','maj6':'maj',
    'min':'min','min7':'min','mMaj7':'min','min6':'min',
    'dim':'dim','hdim':'dim','dim7':'dim',
    'aug':'aug','sus4':'sus4','sus2':'sus2','5':'5'};
  const baseQuality=Q2BASE[picker.qualityId]||'maj';
  const SEVENTH_OPTS={
    'maj':[{id:'none',lbl:'—'},{id:'dom7',lbl:'7'},{id:'maj7',lbl:'Δ'},{id:'maj6',lbl:'6'}],
    'min':[{id:'none',lbl:'—'},{id:'min7',lbl:'7'},{id:'mMaj7',lbl:'Δ'},{id:'min6',lbl:'6'}],
    'dim':[{id:'none',lbl:'—'},{id:'hdim',lbl:'ø'},{id:'dim7',lbl:'°7'}],
    'aug':[{id:'none',lbl:'—'},{id:'dom7',lbl:'7'},{id:'maj7',lbl:'Δ'}],
    'sus4':[{id:'none',lbl:'—'},{id:'dom7',lbl:'7'}],
    'sus2':[{id:'none',lbl:'—'}],
    '5':[{id:'none',lbl:'—'}],
  };
  const seventhOpts=SEVENTH_OPTS[baseQuality]||[{id:'none',lbl:'—'}];

  // Rendu d'une rangée de slots (start..end exclu)
  const renderBeatRow=(from,to,rowLabel)=>(
    <div>
      {isGrande&&<div style={{fontSize:9,fontWeight:700,color:'#8A847C',letterSpacing:0.8,
        marginBottom:4,textTransform:'uppercase'}}>{rowLabel}</div>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
        {localBeats.slice(from,to).map((beat,idx)=>{
          const bi=from+idx;
          const hasChord=!!beat.c;
          const isSel=bi===selectedBeat;
          const disp=beat.c?applyPrefs(beat.c,prefs)||'—':'';
          return(
            <div key={bi} style={{position:'relative',paddingTop:11}}>
              <span style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',
                fontSize:8,fontWeight:800,color:isSel?'#1A1A1A':'#B8B2A8',lineHeight:1,userSelect:'none'}}>
                {bi+1}
              </span>
              <button onClick={()=>selectBeat(bi)}
                style={{width:'100%',
                  background:isSel?'#1A1A1A':(hasChord?'#EDE8E0':'transparent'),
                  color:isSel?'#F2EDE4':(hasChord?'#1A1A1A':'#C0BAB0'),
                  border:`2px solid ${isSel?'#1A1A1A':(hasChord?'#C8C2B8':'#D8D4CE')}`,
                  borderRadius:14,padding:'7px 2px',
                  fontSize:hasChord?13:20,fontWeight:hasChord?900:300,
                  cursor:'pointer',fontFamily:'inherit',lineHeight:1,
                  minHeight:38,transition:'all 0.1s',
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {hasChord?disp:'+'}
              </button>
              {isSel&&hasChord&&(
                <button onClick={deleteBeat}
                  style={{position:'absolute',top:3,right:-5,width:17,height:17,
                    background:'#C0392B',border:'2px solid #EDE8E0',borderRadius:'50%',
                    color:'white',fontSize:10,fontWeight:900,cursor:'pointer',
                    display:'flex',alignItems:'center',justifyContent:'center',
                    lineHeight:1,fontFamily:'inherit',padding:0}}>×</button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );

  return(<Sheet onClose={onCancel}>
    {/* ── Header : slots de temps (4 ou 8 pour grande mesure) ── */}
    <div style={{padding:'12px 18px 10px',borderBottom:'1px solid #D6D0C8'}}>
      {isGrande?(
        <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:10}}>
          {renderBeatRow(0,4,'Mesure principale')}
          <div style={{height:1,background:'#E8E2D8'}}/>
          {renderBeatRow(4,8,'Suite')}
        </div>
      ):(
        <div style={{marginBottom:10}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
            {localBeats.map((beat,bi)=>{
              const hasChord=!!beat.c;
              const isSel=bi===selectedBeat;
              const disp=beat.c?applyPrefs(beat.c,prefs)||'—':'';
              return(
                <div key={bi} style={{position:'relative',paddingTop:11}}>
                  <span style={{position:'absolute',top:0,left:'50%',transform:'translateX(-50%)',
                    fontSize:8,fontWeight:800,color:isSel?'#1A1A1A':'#B8B2A8',lineHeight:1,userSelect:'none'}}>
                    {bi+1}
                  </span>
                  <button onClick={()=>selectBeat(bi)}
                style={{width:'100%',
                  background:isSel?'#1A1A1A':(hasChord?'#EDE8E0':'transparent'),
                  color:isSel?'#F2EDE4':(hasChord?'#1A1A1A':'#C0BAB0'),
                  border:`2px solid ${isSel?'#1A1A1A':(hasChord?'#C8C2B8':'#D8D4CE')}`,
                  borderRadius:14,padding:'7px 2px',
                  fontSize:hasChord?13:20,fontWeight:hasChord?900:300,
                  cursor:'pointer',fontFamily:'inherit',lineHeight:1,
                  minHeight:38,transition:'all 0.1s',
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {hasChord?disp:'+'}
              </button>
                  {isSel&&hasChord&&(
                    <button onClick={deleteBeat}
                      style={{position:'absolute',top:3,right:-5,width:17,height:17,
                        background:'#C0392B',border:'2px solid #EDE8E0',borderRadius:'50%',
                        color:'white',fontSize:10,fontWeight:900,cursor:'pointer',
                        display:'flex',alignItems:'center',justifyContent:'center',
                        lineHeight:1,padding:0,zIndex:10}}>×</button>
                  )}
                </div>
              );
            })}
          </div>
        </div>
      )}
      {/* Accord sélectionné */}
      <div style={{display:'flex',alignItems:'baseline',gap:8,minHeight:28}}>
        <span style={{fontSize:10,color:'#8A847C',fontWeight:700,textTransform:'uppercase',letterSpacing:0.8}}>
          {isSelSpec?'Accord spécial':`Temps ${selectedBeat+1}`}
        </span>
        {!isSelSpec&&selBeat.c&&(
          <span style={{fontSize:26,fontWeight:900,letterSpacing:'-0.5px',lineHeight:1,color:'#1A1A1A'}}>
            {chord}
          </span>
        )}
        {!selBeat.c&&(
          <span style={{fontSize:12,color:'#B0AA9F',fontStyle:'italic'}}>— vide, choisir une note —</span>
        )}
      </div>
    </div>

    {/* ── Raccourcis spéciaux : / — % toujours visibles ── */}
    <div style={{padding:'8px 20px 0',borderTop:'1px solid #E8E2D8',display:'flex',gap:6}}>
      {[{c:'/',lbl:'/',hint:'Répétition'},{c:'—',lbl:'—',hint:'Silence'},{c:'%',lbl:'%',hint:'Mesure répétée'}].map(({c,lbl,hint})=>{
        const active=selBeat.c===c;
        return(<button key={c} title={hint}
          onClick={()=>{const nb=localBeats.map((b,i)=>i===selectedBeat?{...b,c}:b);onChange({...picker,localBeats:nb});}}
          style={{flex:1,background:active?'#1A1A1A':'transparent',
            border:`1.5px solid ${active?'#1A1A1A':'#C0BAB0'}`,
            color:active?'#F2EDE4':'#6A6460',
            borderRadius:10,padding:'7px 4px',cursor:'pointer',fontFamily:'inherit',
            fontSize:16,fontWeight:700,lineHeight:1}}>
          {lbl}
        </button>);
      })}
    </div>
    {isSelSpec&&<div style={{flex:1}}/>}
    {!isSelSpec&&<div style={{overflowY:'auto',flex:1,padding:'14px 20px 6px'}}>
      {secLbl('Fondamentale')}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6,marginBottom:10}}>
        {LETTERS.map(l=>(
          <button key={l} className="pill-btn" style={pill(picker.letter===l)}
            onClick={()=>{
              if(picker.letter===l){
                // Désélectionner la fondamentale : garder la basse si présente
                const bassStr=(picker.bass||'')+((picker.bass&&picker.bassAcc)?picker.bassAcc:'');
                const newC=bassStr?'/'+bassStr:'';
                const nb=(picker.localBeats||[]).map((b,i)=>i===selectedBeat?{...b,c:newC}:b);
                // bass/bassAcc restent inchangés dans le picker
                onChange({...picker,letter:'',acc:'',qualityId:'maj7',extensions:[],localBeats:nb});
              } else {
                const newAcc=autoHarmonize?scaleAccForLetter(l,displayKey,displayMode):'';
                onChange({...picker,letter:l,acc:newAcc,...(autoHarmonize?autoHarmonizeTriad(l,newAcc,displayKey,displayMode):{})});
              }
            }}>{l}</button>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:14}}>
        {[{v:'',l:'♮'},{v:'#',l:'♯'},{v:'b',l:'♭'}].map(a=>(
          <button key={a.v} className={`pill-btn${picker.acc===a.v?' active-pill':''}`}
            style={{...pill(picker.acc===a.v,prefs?.darkMode?'#B090E0':'#6040B0'),padding:'8px 0',fontSize:13}}
            onClick={()=>onChange({...picker,acc:a.v,...(autoHarmonize?autoHarmonizeTriad(picker.letter,a.v,displayKey,displayMode):{})})}  >{a.l}</button>
        ))}
      </div>

      {secLbl('Qualité')}
      {/* Étape 1a : 3 qualités principales — grands boutons */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:8,marginBottom:8}}>
        {[
          {id:'maj',lbl:'Majeur'},
          {id:'min',lbl:'mineur'},
          {id:'dim',lbl:prefs?.dim==='°'?'°':'dim'},
        ].map(q=>(
          <button key={q.id}
            style={{...pill(baseQuality===q.id),padding:'12px 0',fontSize:14}}
            onClick={()=>onChange({...picker,qualityId:q.id})}>
            {q.lbl}
          </button>
        ))}
      </div>
      {/* Étape 1b : qualités secondaires — petits boutons */}
      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[
          {id:'aug',lbl:prefs?.aug==='+'?'+':'aug'},
          {id:'sus4',lbl:'sus4'},
          {id:'sus2',lbl:'sus2'},
        ].map(q=>(
          <button key={q.id}
            style={{...smPill(baseQuality===q.id),opacity:baseQuality===q.id?1:0.6}}
            onClick={()=>onChange({...picker,qualityId:q.id})}>
            {q.lbl}
          </button>
        ))}
      </div>
      {/* Étape 2 : ajouter une septième */}
      {seventhOpts.length>1&&(<>
        <div style={{fontSize:9,color:'#B0AA9F',letterSpacing:0.8,marginBottom:6,fontWeight:600,marginTop:2}}>+ SEPTIÈME</div>
        <div style={{display:'flex',gap:6,marginBottom:10}}>
          {seventhOpts.map(opt=>{
            const isActive=opt.id==='none'?picker.qualityId===baseQuality:picker.qualityId===opt.id;
            return(
              <button key={opt.id}
                style={{...smPill(isActive,'#4A3F2F'),minWidth:48,textAlign:'center'}}
                onClick={()=>onChange({...picker,qualityId:opt.id==='none'?baseQuality:opt.id})}>
                {opt.lbl}
              </button>
            );
          })}
        </div>
      </>)}

      {secLbl('Extensions & altérations')}
      <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
        {EXTENSIONS.map(e=>{
          const active=picker.extensions.includes(e.id);
          return(<button key={e.id} className={`pill-btn${active?' active-pill':''}`}
            style={{...smPill(active,'#4A3F2F')}}
            onClick={()=>onChange({...picker,extensions:active
              ?picker.extensions.filter(x=>x!==e.id):[...picker.extensions,e.id]})}>
            {e.label}
          </button>);
        })}
      </div>
      {picker.extensions.length>0&&(
        <button onClick={()=>onChange({...picker,extensions:[]})}
          style={{background:'transparent',border:'none',color:'#8A847C',fontSize:12,
            cursor:'pointer',textDecoration:'underline',fontFamily:'inherit',marginBottom:10,display:'block'}}>
          Effacer les extensions
        </button>
      )}

      {secLbl('Basse (facultatif — recliquer pour effacer)')}
      <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:6,marginBottom:6}}>
        {LETTERS.map(l=>(
          <button key={l} className="pill-btn" style={pill(picker.bass===l)}
            onClick={()=>{
              if(picker.bass===l){
                // Désélectionner la basse
                onChange({...picker,bass:'',bassAcc:''});
              } else {
                const newBassAcc=autoHarmonize?scaleAccForLetter(l,displayKey,displayMode):'';
                onChange({...picker,bass:l,bassAcc:newBassAcc});
              }
            }}>{l}</button>
        ))}
      </div>
      {picker.bass&&(
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6,marginBottom:10}}>
          {[{v:'',l:'♮'},{v:'#',l:'♯'},{v:'b',l:'♭'}].map(a=>(
            <button key={a.v} className={`pill-btn${picker.bassAcc===a.v?' active-pill':''}`}
              style={{...pill(picker.bassAcc===a.v,'#4A3F2F'),padding:'8px 0',fontSize:13}}
              onClick={()=>onChange({...picker,bassAcc:a.v})}>{a.l}</button>
          ))}
        </div>
      )}

      {/* ── Navigation compacte : Signes · Crochet · Annotation · Section ── */}
      <div style={{borderTop:'1px solid #E8E2D8',paddingTop:10,marginTop:6,paddingBottom:4}}>
        {/* 4 boutons de statut */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>

          {/* Signes */}
          <button onClick={()=>toggleSub('signs')}
            style={{background:subPanel==='signs'?'#1A1A1A':'#F5F2EC',
              border:`1.5px solid ${subPanel==='signs'?'#1A1A1A':'#D0CAC0'}`,
              borderRadius:10,padding:'7px 4px',cursor:'pointer',fontFamily:'inherit',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              gap:0,transition:'all 0.1s',minWidth:0,minHeight:46}}>
            <span style={{fontSize:10,fontWeight:800,lineHeight:1.3,textAlign:'center',
              color:subPanel==='signs'?'#F2EDE4':'#A09A90',
              overflow:'hidden',maxWidth:'100%',letterSpacing:0.3}}>
              {hasSign?signs.map(s=>SIGN_TYPES.find(x=>x.id===s)?.sym).join(' '):'⊕ 𝄋 D.C.'}
            </span>
          </button>

          {/* Crochet de volta */}
          <button onClick={()=>toggleSub('volta')}
            style={{background:subPanel==='volta'?'#1A1A1A':'#F5F2EC',
              border:`1.5px solid ${subPanel==='volta'?'#1A1A1A':'#D0CAC0'}`,
              borderRadius:10,padding:'7px 4px',cursor:'pointer',fontFamily:'inherit',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              gap:0,transition:'all 0.1s',minWidth:0,minHeight:46}}>
            <span style={{display:'inline-flex',alignItems:'flex-start',
              borderLeft:`2px solid ${subPanel==='volta'?'#F2EDE4':'#B0AAA0'}`,
              borderTop:`2px solid ${subPanel==='volta'?'#F2EDE4':'#B0AAA0'}`,
              padding:'2px 6px',lineHeight:1,fontSize:10,fontWeight:900,
              color:subPanel==='volta'?'#F2EDE4':'#A09A90'}}>
              {hasVolta?`${volta}.`:'  '}
            </span>
          </button>

          {/* Annotation */}
          <button onClick={()=>toggleSub('annotation')}
            style={{background:subPanel==='annotation'?'#1A1A1A':'#F5F2EC',
              border:`1.5px solid ${subPanel==='annotation'?'#1A1A1A':'#D0CAC0'}`,
              borderRadius:10,padding:'7px 4px',cursor:'pointer',fontFamily:'inherit',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              gap:0,transition:'all 0.1s',minWidth:0,minHeight:46}}>
            <span style={{fontSize:9,fontStyle:'italic',fontWeight:700,lineHeight:1.2,
              textAlign:'center',
              color:subPanel==='annotation'?'#F2EDE4':'#A09A90',
              overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>
              {mText||'Solo Intro…'}
            </span>
          </button>

          {/* Nom de section */}
          {onRenameSection?(
            <button onClick={()=>toggleSub('section')}
              style={{background:subPanel==='section'?'#1A1A1A':'#F5F2EC',
                border:`1.5px solid ${subPanel==='section'?'#1A1A1A':'#D0CAC0'}`,
                borderRadius:10,padding:'7px 4px',cursor:'pointer',fontFamily:'inherit',
                display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
                gap:0,transition:'all 0.1s',minWidth:0,minHeight:46}}>
              <span style={{fontSize:9,fontWeight:700,lineHeight:1.2,
                textAlign:'center',
                color:subPanel==='section'?'#F2EDE4':'#A09A90',
                overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:'100%'}}>
                {sectionName||'Intro A B…'}
              </span>
            </button>
          ):(
            <div style={{background:'#F5F2EC',border:'1.5px solid #D0CAC0',borderRadius:10,padding:'7px 4px',
              display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',
              gap:0,opacity:0.35,minHeight:46}}>
              <span style={{fontSize:9,fontWeight:700,color:'#A09A90',lineHeight:1.2,textAlign:'center'}}>
                Intro A B…
              </span>
            </div>
          )}
        </div>

        {/* ── Sous-panneau Signes (pour le temps sélectionné) ── */}
        {subPanel==='signs'&&(
          <div style={{marginTop:8,padding:'10px 12px',background:'rgba(42,90,42,0.05)',
            borderRadius:10,border:'1.5px solid rgba(42,90,42,0.18)'}}>
            <div style={{fontSize:9,color:'#5A7A5A',fontWeight:700,marginBottom:6,letterSpacing:0.5}}>
              Au-dessus du temps {selectedBeat+1}
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {SIGN_TYPES.map(st=>{
                const active=signs.includes(st.id);
                return(<button key={st.id}
                  style={{...smPill(active,'#2A5A2A'),border:`1.5px solid ${active?'#2A5A2A':'#C0BAB0'}`}}
                  onClick={()=>updBeat({s:active?signs.filter(x=>x!==st.id):[...signs,st.id]})}>
                  {st.sym}
                </button>);
              })}
            </div>
          </div>
        )}

        {/* ── Sous-panneau Crochet de volta (pour le temps sélectionné) ── */}
        {subPanel==='volta'&&(
          <div style={{marginTop:8,padding:'10px 12px',background:'rgba(0,0,0,0.04)',
            borderRadius:10,border:'1.5px solid #D0CAC0'}}>
            <div style={{fontSize:9,color:'#7A7070',fontWeight:700,marginBottom:6,letterSpacing:0.5}}>
              Crochet au-dessus du temps {selectedBeat+1}
            </div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:isCustomVolta?8:0}}>
              <button style={smPill(volta===null)}
                onClick={()=>updBeat({v:null})}>Aucun</button>
              {['1','2','3'].map(v=>(
                <button key={v} style={{...smPill(volta===v&&!isCustomVolta),
                  display:'flex',alignItems:'center',justifyContent:'center'}}
                  onClick={()=>updBeat({v})}>
                  <span style={{display:'inline-flex',alignItems:'flex-start',
                    borderLeft:`2px solid ${volta===v&&!isCustomVolta?'#F2EDE4':'#1A1A1A'}`,

// ─── CHORD TEXT — typographie iReal Pro (racine grande, altération + qualité petites) ──
function ChordText({chord,fs=30,color='#1C1C1E',weight=500}){
  if(!chord)return null;
  const CF=CHORD_FONT;
  // Basse seule : chord commence par '/'
  if(chord.startsWith('/')){
    const bassOnly=chord.slice(1);
    const bR=parseRoot(bassOnly);
    const bL=bR?bR[0]:(bassOnly[0]||'');
    const bAcc=(bR&&bR.length>1)?bR.slice(1):'';
    const bAccDisp=bAcc; // format brut : 'b', '#' ou ''
    const bFs=Math.round(fs*0.72);
    return(
      <span style={{display:'inline-flex',alignItems:'flex-start',gap:0,lineHeight:1,color,fontFamily:CF}}>
        <span style={{fontSize:Math.round(bFs*0.72),fontWeight:400,lineHeight:1,color:color==='#1C1C1E'?'#8A8A8A':color}}>/</span>
        <span style={{fontSize:bFs,fontWeight:weight,lineHeight:1}}>{bL}</span>
        {bAccDisp&&<span style={{fontSize:Math.round(bFs*0.56),fontWeight:weight,lineHeight:1,paddingTop:2}}>{bAccDisp}</span>}
      </span>
    );
  }
  // Extraire la note de basse
  const si=chord.lastIndexOf('/');
  const bassStr=si>0?chord.slice(si+1):'';
  const mainChord=si>0?chord.slice(0,si):chord;
  const rawRoot=parseRoot(mainChord);
  // Désambiguïsation : si l'altération de la racine + reste correspond à un suffixe d'extension connu
  // et que le reste seul ne démarre aucun suffixe de qualité → l'altération appartient à l'extension
  const root=(()=>{
    if(!rawRoot||rawRoot.length<2)return rawRoot;
    const a=rawRoot[1];
    const rest=mainChord.slice(rawRoot.length);
    const isExt=EXTENSIONS.some(e=>e.suffix.length>=2&&(a+rest).startsWith(e.suffix));
    const hasQual=QUALITIES.some(q=>q.suffix!==''&&rest.startsWith(q.suffix));
    return(isExt&&!hasQual)?rawRoot[0]:rawRoot;
  })();
  const accFs=Math.round(fs*0.52);
  const sfxFs=Math.round(fs*0.44);
  const sfxTop=Math.round(fs*0.20);
  const renderMain=root?(()=>{
    const letter=root[0];
    const rawAcc=root.slice(1);
    const acc=rawAcc; // format brut : 'b', '#' ou ''
    const suffix=mainChord.slice(root.length);
    // Découper le suffix en partie qualité + parties extensions pour micro-espacement
    const sortedQ=[...QUALITIES].filter(q=>q.suffix!=='').sort((a,b)=>b.suffix.length-a.suffix.length);
    const qualPart=sortedQ.find(q=>suffix.startsWith(q.suffix))?.suffix||'';
    let extRem=suffix.slice(qualPart.length);
    const sortedE=[...EXTENSIONS].sort((a,b)=>b.suffix.length-a.suffix.length);
    const extSegs=[];
    while(extRem){const e=sortedE.find(e=>extRem.startsWith(e.suffix));if(e){extSegs.push(e.suffix);extRem=extRem.slice(e.suffix.length);}else{extSegs.push(extRem[0]);extRem=extRem.slice(1);}}
    const sfxParts=[...(qualPart?[qualPart]:[]),...extSegs];
    const sfxColor=color==='#1C1C1E'?'#525252':color;
    const extGap=Math.round(Math.max(1,fs*0.06));
    return(
      <span style={{display:'inline-flex',alignItems:'flex-end',gap:0,lineHeight:1,fontFamily:CF}}>
        <span style={{fontSize:fs,fontWeight:weight,lineHeight:1,letterSpacing:0}}>{letter}</span>
        {(acc||suffix)&&(
          <span style={{display:'flex',flexDirection:'column',alignItems:'flex-start',lineHeight:1,
            minHeight:fs,marginLeft:-2}}>
            {acc&&<span style={{fontSize:accFs,fontWeight:500,lineHeight:1}}>{acc}</span>}
            {sfxParts.length>0&&(
              <span style={{display:'inline-flex',flexDirection:'row',alignItems:'flex-end',
                lineHeight:1,gap:extGap,marginTop:'auto',
                marginBottom:Math.round(fs*0.12),marginLeft:Math.round(fs*0.04)}}>
                {sfxParts.map((p,i)=>(
                  <span key={i} style={{fontSize:sfxFs,fontWeight:400,lineHeight:1,color:sfxColor}}>{p}</span>
                ))}
              </span>
            )}
          </span>
        )}
      </span>
    );
  })():(<span style={{fontSize:fs,fontWeight:weight,lineHeight:1,fontFamily:CF}}>{mainChord}</span>);
  const bassRoot=bassStr?parseRoot(bassStr):null;
  const bassLetter=bassRoot?bassRoot[0]:(bassStr?bassStr[0]||'':'');
  const bassRawAcc=bassRoot?bassRoot.slice(1):'';
  const bassAccDisp=bassRawAcc; // format brut : 'b', '#' ou ''
  const bassFs=Math.round(fs*0.46);
  const bassTop=Math.round(fs*0.92);   // légèrement descendu
  const bassLeft=Math.round(fs*0.28);  // légèrement à droite
  // Même wrapper inline-block dans les deux cas → pas de saut de position
  return(
    <span style={{display:'inline-block',position:'relative',lineHeight:1,color,fontFamily:CF,
      paddingRight:bassStr?Math.round(bassFs*1.2):0,
      overflow:'visible'}}>
      {renderMain}
      {bassStr&&(
        <span style={{position:'absolute',top:bassTop,left:bassLeft,
          display:'inline-flex',alignItems:'baseline',gap:0,lineHeight:1}}>
          <span style={{fontSize:Math.round(bassFs*0.75),fontWeight:400,lineHeight:1,color:color==='#1C1C1E'?'#8A8A8A':color}}>/</span>
          <span style={{fontSize:bassFs,fontWeight:weight,lineHeight:1,color:color==='#1C1C1E'?'#525252':color}}>{bassLetter}{bassAccDisp}</span>
        </span>
      )}
    </span>
  );
}


// ─── DEGREE TEXT — même typographie que ChordText pour le mode degrés ─────────
function DegreeText({deg,fs=30,color='#1C1C1E',weight=900}){
  if(!deg)return null;
  // Parse : altération optionnelle + chiffre romain + qualité
  const m=deg.match(/^([b#]?)(I{1,3}|IV|VI{0,3}|VII?)(.*)/);
  if(!m)return<span style={{fontSize:fs,fontWeight:weight,color,letterSpacing:'-0.3px'}}>{deg}</span>;
  const acc=m[1]==='b'?'♭':m[1]==='#'?'♯':'';
  const numeral=m[2];
  const suffix=m[3];
  const accFs=Math.round(fs*0.52);
  const sfxFs=Math.round(fs*0.44);
  const sfxTop=Math.round(fs*0.20);
  return(
    <span style={{display:'inline-flex',alignItems:'flex-start',gap:0,lineHeight:1,color}}>
      {acc&&<span style={{fontSize:accFs,fontWeight:weight,lineHeight:1,paddingTop:1}}>{acc}</span>}
      <span style={{fontSize:fs,fontWeight:weight,lineHeight:1,letterSpacing:'-0.3px'}}>{numeral}</span>
      {suffix&&(
        <span style={{display:'flex',flexDirection:'column',alignItems:'flex-start',lineHeight:1,
          paddingLeft:1,paddingTop:sfxTop}}>
          <span style={{fontSize:sfxFs,fontWeight:700,lineHeight:1,
            color:color==='#1C1C1E'?'#3A3530':color}}>{suffix}</span>
        </span>
      )}
    </span>
  );
}

// ─── STAFF SECTION VIEW ────────────────────────────────────────────────────────
function StaffSectionView({section,onUpdate,onDelete,editMode=true,prefs}){
  const [showSettings,setShowSettings]=useState(false);
  const isDark=!!prefs?.darkMode;

  const timeSig   = section.timeSig   || '4/4';
  const clef      = section.clef      || 'treble';
  const staffKey  = section.key       || 'C';
  const showTimeSig = section.showTimeSig !== false;
  const showKey     = section.showKey   !== false;

  const COLS=4;
  const ks=KEY_SIG[staffKey]||{t:'s',n:0};
  const totalBeats=getBeatsInEighths(timeSig);
  const SLOT_W=22;
  const MWD=totalBeats*SLOT_W;
  const CLEF_W=clef!=='none'?38:0;
  const ACC_W=showKey&&clef!=='none'?Math.max(ks.n*10+6,4):0;
  const TSW=showTimeSig?28:0;
  const PREF_W=CLEF_W+ACC_W+TSW;
  const INK=isDark?'#E8E4DC':'#1A1A1A';
  const SBGR=isDark?'#1E1C1A':'#FAFAF8';
  const SHDR=isDark?'rgba(26,24,22,0.98)':'rgba(255,255,255,0.9)';
  const SBDR=isDark?'rgba(255,255,255,0.05)':'rgba(0,0,0,0.07)';
  const STXT=isDark?'#F2EDE4':'#1C1C1E';
  const SSUB=isDark?'#8A8480':'#8A847C';
  const SBTN=isDark?'#4A4845':'#D0CAC0';
  const SBTNTXT=isDark?'#C0BAB0':'#6B6560';
  const SLINE=isDark?'#3A3634':'#D0CAC0'; // string/filler lines
  const SFILL=isDark?'#2A2826':'#EDE8E0'; // filler partial-measure area
  const SHP_Y_S=[35,50,30,45,60,40,55];  // targets[30,45,25,40,55,35,50] + 5px baseline offset pour fontSize 15
  const FLT_Y_S=[55,40,60,45,65,50,70];  // targets[50,35,55,40,60,45,65] + 5px baseline offset pour fontSize 15

  function updateSection(patch){onUpdate({...section,...patch});}

  function deleteMeasure(mi){
    if(section.measures.length<=1)return;
    onUpdate({...section,measures:section.measures.filter((_,i)=>i!==mi)});
  }

  function clearAnnotations(mi){
    onUpdate({...section,measures:section.measures.map((mm,i)=>
      i!==mi?mm:{...mm,annotations:[]}
    )});
  }

  function clearAll(){
    onUpdate({...section,measures:section.measures.map(mm=>({...mm,annotations:[]}))});
  }

  function addMeasure(){
    onUpdate({...section,measures:[...section.measures,mkStaffMeasure()]});
  }

  function renderPrefix(){
    return(<g>
      {clef==='treble'&&<text x={2} y={65} fontSize="46" fontFamily="serif" fill={INK}>𝄞</text>}
      {clef==='bass'  &&<text x={2} y={63} fontSize="38" fontFamily="serif" fill={INK}>𝄢</text>}
      {showKey&&clef!=='none'&&ks.t==='s'&&Array.from({length:ks.n}).map((_,i)=>(
        <text key={i} x={CLEF_W+i*10} y={SHP_Y_S[i]} fontSize="15" fontFamily="serif" fill={INK}>♯</text>
      ))}
      {showKey&&clef!=='none'&&ks.t==='f'&&Array.from({length:ks.n}).map((_,i)=>(
        <text key={i} x={CLEF_W+i*10} y={FLT_Y_S[i]} fontSize="15" fontFamily="serif" fill={INK}>♭</text>
      ))}
      {showTimeSig&&(<>
        <text x={CLEF_W+ACC_W+TSW/2} y={47} fontSize="18" fontWeight="bold" fontFamily="serif" fill={INK} textAnchor="middle">
          {timeSig.split('/')[0]}
        </text>
        <text x={CLEF_W+ACC_W+TSW/2} y={67} fontSize="18" fontWeight="bold" fontFamily="serif" fill={INK} textAnchor="middle">
          {timeSig.split('/')[1]}
        </text>
      </>)}
    </g>);
  }

  function renderMeasureSVG(mi,isFirst){
    const m=section.measures[mi];
    const annotations=(m?.annotations)||[];
    const svgW=(isFirst?PREF_W:0)+MWD+1;

    return(
      <svg key={mi} width={svgW} height={STAFF_H}
        style={{flexShrink:0,overflow:'visible',cursor:'default',userSelect:'none'}}>

        {/* Lignes de portée */}
        {STAFF_LINES.map(ly=>(
          <line key={ly} x1={0} x2={svgW} y1={ly} y2={ly} stroke={INK} strokeWidth="1" opacity="0.6"/>
        ))}

        {/* Préfixe (clef + armure + chiffrage) — 1ère mesure seulement */}
        {isFirst&&renderPrefix()}

        {/* Barre de fin de mesure */}
        <line x1={svgW-1} y1={STAFF_LINES[0]} x2={svgW-1} y2={STAFF_LINES[4]}
          stroke={INK} strokeWidth="1.3"/>

        {/* Annotations sauvegardées (rétro-compat) */}
        {annotations.map((ann,ai)=>(
          <path key={ai} d={ann.path} fill="none" stroke={ann.color||'#1C1C1E'}
            strokeWidth={ann.width||2} strokeLinecap="round" strokeLinejoin="round"/>
        ))}
      </svg>
    );
  }

  const rows=[];
  for(let i=0;i<section.measures.length;i+=COLS)
    rows.push(section.measures.slice(i,i+COLS).map((_,j)=>i+j));

  const pill=(active,col='#1A1A1A')=>({
    background:active?col:'transparent',color:active?'#F2EDE4':STXT,
    border:`1.5px solid ${active?col:SBTN}`,borderRadius:100,
    padding:'6px 10px',fontSize:12,fontWeight:700,cursor:'pointer',fontFamily:'inherit',transition:'all 0.1s'
  });

  // ── MODE LECTURE ──
  if(!editMode){
    return(
      <div style={{background:SBGR,overflow:'hidden',display:'flex',flexDirection:'column'}}>
        {/* Portée avec renvoi à la ligne (COLS mesures par ligne) */}
        <div style={{padding:'4px 4px 4px',background:SBGR,flexShrink:0}}>
          {rows.map((rowMis,ri)=>(
            <div key={ri} style={{display:'flex',alignItems:'flex-start',
              marginBottom:ri<rows.length-1?4:0,overflowX:'auto'}}>
              {ri>0&&<div style={{width:PREF_W,flexShrink:0}}/>}
              {rowMis.map((mi,rmi)=>renderMeasureSVG(mi,ri===0&&rmi===0))}
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ── MODE ÉDITION ──
  return(
    <div style={{background:SBGR,overflow:'visible',
      borderTop:`0.5px solid ${SBDR}`,borderBottom:`0.5px solid ${SBDR}`}}>

      {/* ── En-tête ── */}
      <div style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',
        borderBottom:`0.5px solid ${SBDR}`}}>
        <span style={{fontSize:12,fontWeight:700,flex:1,color:STXT}}>{section.name}</span>
        {showTimeSig&&<span style={{fontSize:11,color:SSUB,fontWeight:600}}>{timeSig}</span>}
        <button onClick={()=>setShowSettings(true)}
          style={{background:'transparent',border:`1.5px solid ${SBTN}`,
            borderRadius:100,padding:'3px 10px',fontSize:11,cursor:'pointer',
            fontFamily:'inherit',color:SBTNTXT,fontWeight:600}}>
          Modifier
        </button>
        <button onClick={addMeasure}
          style={{background:'transparent',border:`1.5px solid ${SBTN}`,
            borderRadius:100,padding:'3px 10px',fontSize:11,cursor:'pointer',
            fontFamily:'inherit',color:SBTNTXT,fontWeight:600}}>
          + Mesure
        </button>
        <button onClick={clearAll}
          style={{background:'transparent',border:'1px solid #FFBBBB',borderRadius:100,
            padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit',color:'#C0392B',fontWeight:600}}>
          Effacer
        </button>
        {onDelete&&(
          <button onClick={onDelete}
            style={{background:'transparent',border:'1px solid #FFBBBB',borderRadius:100,
              padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit',color:'#C0392B',fontWeight:600}}>
            × Section
          </button>
        )}
      </div>

      {/* ── Panneau volant de personnalisation (flottant, non-bloquant) ── */}
      {showSettings&&(
        <div style={{position:'fixed',bottom:56,left:10,right:10,maxWidth:460,margin:'0 auto',
          background:isDark?'rgba(26,24,22,0.97)':'rgba(240,236,228,0.97)',
          backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)',
          borderRadius:18,padding:'14px 18px 20px',
          boxShadow:'0 8px 40px rgba(0,0,0,0.22),0 2px 8px rgba(0,0,0,0.10)',
          zIndex:350,maxHeight:'54vh',overflowY:'auto'}}
          onClick={e=>e.stopPropagation()}>

          {/* En-tête panneau */}
          <div style={{display:'flex',alignItems:'center',marginBottom:14}}>
            <span style={{fontSize:11,fontWeight:700,color:SSUB,textTransform:'uppercase',
              letterSpacing:1.2,flex:1}}>Portée — {section.name}</span>
            <button onClick={()=>setShowSettings(false)}
              style={{background:isDark?'rgba(255,255,255,0.1)':'rgba(0,0,0,0.07)',border:'none',borderRadius:'50%',
                width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',
                cursor:'pointer',color:SBTNTXT,fontSize:16,fontWeight:700,fontFamily:'inherit'}}>×</button>
          </div>

          {/* Clef */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:9,fontWeight:700,color:SSUB,textTransform:'uppercase',
              letterSpacing:1.2,marginBottom:7}}>Clef</div>
            <div style={{display:'flex',gap:6}}>
              {[{v:'treble',l:'𝄞 Sol'},{v:'bass',l:'𝄢 Fa'},{v:'none',l:'— Aucune'}].map(opt=>(
                <button key={opt.v} style={pill(clef===opt.v)}
                  onClick={()=>updateSection({clef:opt.v})}>{opt.l}</button>
              ))}
            </div>
          </div>

          {/* Armure */}
          {clef!=='none'&&(
            <div style={{marginBottom:14}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
                <div style={{fontSize:9,fontWeight:700,color:SSUB,textTransform:'uppercase',letterSpacing:1.2}}>
                  Armure
                </div>
                <button onClick={()=>updateSection({showKey:!showKey})}
                  style={{fontSize:10,color:showKey?'#007AFF':SSUB,background:'none',border:'none',
                    cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
                  {showKey?'Affichée':'Masquée'}
                </button>
              </div>
              {showKey&&(
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                  {ALL_KEYS.map(k=>(
                    <button key={k} style={{...pill(staffKey===k),padding:'5px 9px',fontSize:12}}
                      onClick={()=>updateSection({key:k})}>{k}</button>
                  ))}
                </div>
              )}
            </div>
          )}

          {/* Chiffrage */}
          <div style={{marginBottom:14}}>
            <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:7}}>
              <div style={{fontSize:9,fontWeight:700,color:SSUB,textTransform:'uppercase',letterSpacing:1.2}}>
                Chiffrage
              </div>
              <button onClick={()=>updateSection({showTimeSig:!showTimeSig})}
                style={{fontSize:10,color:showTimeSig?'#007AFF':SSUB,background:'none',border:'none',
                  cursor:'pointer',fontFamily:'inherit',fontWeight:600}}>
                {showTimeSig?'Affiché':'Masqué'}
              </button>
            </div>
            {showTimeSig&&(
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                {TIME_SIGS.map(ts=>(
                  <button key={ts} style={{...pill(timeSig===ts),padding:'5px 10px',fontSize:12}}
                    onClick={()=>updateSection({timeSig:ts})}>{ts}</button>
                ))}
              </div>
            )}
          </div>

        </div>
      )}

      {/* ── Portée ── */}
      <div style={{overflowX:'auto',padding:'8px 4px 4px',background:SBGR}}>
        {rows.map((rowMis,ri)=>(
          <div key={ri} style={{display:'flex',alignItems:'flex-start',marginBottom:4,minWidth:'fit-content'}}>
            {ri>0&&<div style={{width:PREF_W,flexShrink:0}}/>}
            {rowMis.map((mi,rmi)=>(
              <div key={mi} style={{position:'relative',flexShrink:0}}>
                {section.measures.length>1&&(
                  <button onClick={()=>deleteMeasure(mi)}
                    style={{position:'absolute',top:3,right:3,zIndex:10,
                      background:'rgba(200,57,45,0.12)',border:'none',borderRadius:'50%',
                      width:18,height:18,fontSize:11,cursor:'pointer',color:'#C0392B',
                      display:'flex',alignItems:'center',justifyContent:'center',lineHeight:1,
                      fontWeight:700,padding:0}}>×</button>
                )}
                {renderMeasureSVG(mi,ri===0&&rmi===0)}
              </div>
            ))}
          </div>
        ))}
      </div>

    </div>
  );
}
