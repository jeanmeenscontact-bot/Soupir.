                  {tab.lbl}
                </button>
              ))}
            </div>

            {/* ══ ONGLET ACCORD ══════════════════════════════════════════════ */}
            {cpkTab==='accord'&&(<>

              {/* Rythme */}
              {GRP('Rythme', CRYTHME)}
              {LBL('Temps', CRYTHME)}
              <div style={{display:'flex',gap:5,marginBottom:14}}>
                {(picker.localBeats||[]).map((_b,bi)=>{
                  const bc=(picker.localBeats||[])[bi]?.c||'';
                  const filled=bc&&!isSpec(bc);
                  return(
                    <button key={bi} onClick={()=>cpkBeat(bi)}
                      style={{...B,flex:1,height:40,borderRadius:9,fontSize:12,fontWeight:800,
                        background:sbi===bi?CRYTHME:(filled?(isDark?'#2E2C2A':'#E8E4DE'):'transparent'),
                        color:sbi===bi?'#F2EDE4':(filled?(isDark?'#C0BAB0':'#6A6460'):IC),
                        outline:`2px solid ${sbi===bi?CRYTHME:(filled?'#4A4845':BC)}`}}>
                      {sbi===bi&&filled?applyPrefs(bc,prefs)||String(bi+1):String(bi+1)}
                    </button>
                  );
                })}
              </div>

              {/* Accords spéciaux */}
              {LBL('Spécial', CRYTHME)}
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5,marginBottom:14}}>
                {[{c:'/',lbl:'/',hint:'Répétition'},{c:'—',lbl:'—',hint:'Silence'},{c:'%',lbl:'%',hint:'Mesure répétée'}].map(({c,lbl,hint})=>{
                  const active=(picker.localBeats||[])[sbi]?.c===c;
                  return(<button key={c} title={hint} onClick={()=>cpkUpdBeat({c})}
                    style={{...B,height:40,borderRadius:9,fontSize:16,fontWeight:800,
                      background:active?CRYTHME:'transparent',
                      color:active?'#F2EDE4':IC,
                      outline:`2px solid ${active?CRYTHME:BC}`}}>
                    {lbl}
                  </button>);
                })}
              </div>

              {/* Harmonique */}
              {GRP('Harmonique', CHARM)}
              {LBL('Fondamentale', CHARM)}
              <div style={{display:'grid',gridTemplateColumns:`repeat(${LETTERS.length},1fr)`,gap:4,marginBottom:10}}>
                {LETTERS.map(l=>(
                  <button key={l} onClick={()=>cpkNote(l,picker.acc)}
                    style={{...B,height:42,borderRadius:9,fontSize:16,fontWeight:800,
                      background:picker.letter===l?CHARM:'transparent',
                      color:picker.letter===l?'#fff':IC,
                      outline:`2px solid ${picker.letter===l?CHARM:BC}`}}>
                    {l}
                  </button>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4,marginBottom:14}}>
                {[{v:'b',l:'♭'},{v:'',l:'♮'},{v:'#',l:'♯'}].map(a=>(
                  <button key={a.l} onClick={()=>cpkNote(picker.letter,a.v)}
                    style={{...B,height:38,borderRadius:9,fontSize:18,fontWeight:800,
                      background:picker.acc===a.v?CHARM:'transparent',
                      outline:`2px solid ${picker.acc===a.v?CHARM:BC}`}}>
                    <span style={{display:'block',lineHeight:1,
                      backgroundColor:picker.acc===a.v?'#fff':IC,
                      WebkitBackgroundClip:'text',backgroundClip:'text',
                      WebkitTextFillColor:'transparent',color:'transparent'}}>
                      {a.l}
                    </span>
                  </button>
                ))}
              </div>

              {/* Qualité — grille directe 4 colonnes */}
              {LBL('Qualité', CHARM)}
              <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:5}}>
                {[
                  ['maj','M'],['dom7','7'],['maj7','Δ'],['maj6','6'],
                  ['min','m'],['min7','m7'],['mMaj7',prefs?.minor==='-'?'−Δ':'mΔ'],['min6','m6'],
                  ['dim',prefs?.dim==='°'?'°':'dim'],['hdim','ø'],['dim7','°7'],['aug',prefs?.aug==='+'?'+':'aug'],
                  ['sus4','sus4'],['sus2','sus2'],['5','5'],
                ].map(([qid,qlbl])=>(
                  <button key={qid} onClick={()=>cpkQual(qid)}
                    style={{...B,height:42,borderRadius:9,fontSize:13,fontWeight:800,
                      background:picker.qualityId===qid?CHARM:'transparent',
                      color:picker.qualityId===qid?'#fff':IC,
                      outline:`2px solid ${picker.qualityId===qid?CHARM:BC}`}}>
                    {qlbl}
                  </button>
                ))}
              </div>

            </>)}

            {/* ══ ONGLET DÉTAILS ══════════════════════════════════════════════ */}
            {cpkTab==='details'&&(<>

              {/* Harmonique */}
              {GRP('Harmonique', CHARM)}

              {/* Basse — 2 lignes pleine largeur */}
              {LBL('Basse', CHARM)}
              <div style={{display:'grid',gridTemplateColumns:`repeat(${LETTERS.length},1fr)`,gap:4,marginBottom:6}}>
                {LETTERS.map(l=>(
                  <button key={l} onClick={()=>cpkBassNote(l)}
                    style={{...B,height:38,borderRadius:9,fontSize:15,fontWeight:800,
                      background:picker.bass===l?CHARM:'transparent',
                      color:picker.bass===l?'#fff':IC,
                      outline:`2px solid ${picker.bass===l?CHARM:BC}`}}>
                    {l}
                  </button>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:4,marginBottom:10,
                opacity:picker.bass?1:0.35,pointerEvents:picker.bass?'auto':'none'}}>
                {[{v:'b',l:'♭'},{v:'',l:'♮'},{v:'#',l:'♯'}].map(a=>(
                  <button key={a.v} onClick={()=>cpkBassAcc(a.v)}
                    style={{...B,height:36,borderRadius:9,fontSize:16,fontWeight:800,
                      background:picker.bassAcc===a.v?CHARM:'transparent',
                      outline:`2px solid ${picker.bassAcc===a.v?CHARM:BC}`}}>
                    <span style={{display:'block',lineHeight:1,
                      backgroundColor:picker.bassAcc===a.v?'#fff':IC,
                      WebkitBackgroundClip:'text',backgroundClip:'text',
                      WebkitTextFillColor:'transparent',color:'transparent'}}>
                      {a.l}
                    </span>
                  </button>
                ))}
              </div>

              {/* Extensions — grille 5 colonnes pleine largeur */}
              {LBL('Extensions', CHARM)}
              <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:5,marginBottom:4}}>
                {EXTENSIONS.map(e=>{
                  const active=(picker.extensions||[]).includes(e.id);
                  return(
                    <button key={e.id} onClick={()=>cpkExt(e.id)}
                      style={{...B,height:34,borderRadius:8,fontSize:12,fontWeight:700,
                        background:active?CHARM:'transparent',
                        color:active?'#fff':IC,
                        outline:`2px solid ${active?CHARM:BC}`}}>
                      {e.label}
                    </button>
                  );
                })}
              </div>
              {(picker.extensions||[]).length>0&&(
                <button onClick={cpkClearExt}
                  style={{...B,width:'100%',height:28,borderRadius:7,fontSize:11,fontWeight:700,
                    background:'transparent',color:'#C0392B',outline:`1.5px solid #4A2020`,marginBottom:4}}>
                  ✕ Effacer les extensions
                </button>
              )}

              {/* Rythme — Signature */}
              {GRP('Rythme', CRYTHME)}
              {LBL('Signature', CRYTHME)}
              <div style={{display:'grid',gridTemplateColumns:`repeat(${TIME_SIGS.length},1fr)`,gap:5}}>
                {TIME_SIGS.map(ts=>{
                  const curTs=picker.timeSig||pieceTs;
                  const isAct=ts===curTs;
                  return(
                    <button key={ts} onClick={()=>cpkSetTimeSig(ts)}
                      style={{...B,height:36,borderRadius:8,fontSize:12,fontWeight:800,
                        background:isAct?CRYTHME:(isDark?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)'),
                        color:isAct?'#F2EDE4':ts===pieceTs?CRYTHME:IC,
                        outline:`1.5px solid ${isAct?CRYTHME:ts===pieceTs?`${CRYTHME}60`:BC}`,
                        whiteSpace:'nowrap'}}>
                      {ts}
                    </button>
                  );
                })}
              </div>

              {/* Annotations */}
              {GRP('Annotations', CANNOT)}
              <div style={{display:'flex',alignItems:'center',gap:5,overflowX:'auto',marginBottom:0}}>
                <button onClick={()=>cpkToggleSub('signs')} style={subTabStyle('signs')}>
                  {curSigns.length>0?curSigns.map(s=>SIGN_TYPES.find(x=>x.id===s)?.sym).join(' '):'⊕ Signes'}
                </button>
                <button onClick={()=>cpkToggleSub('volta')} style={subTabStyle('volta')}>
                  {curVolta!==null
                    ?<span style={{display:'inline-flex',alignItems:'center',gap:2}}>
                        <span style={{display:'inline-block',width:10,height:9,borderTop:`2px solid currentColor`,borderLeft:`2px solid currentColor`}}/>
                        {curVolta||'?'}.
                      </span>
                    :<span style={{display:'inline-flex',alignItems:'center',gap:2}}>
                        <span style={{display:'inline-block',width:10,height:9,borderTop:`2px solid currentColor`,borderLeft:`2px solid currentColor`}}/>
                        <span style={{opacity:0.5}}>1.</span>
                      </span>
                  }
                </button>
                <button onClick={()=>cpkToggleSub('annotation')} style={subTabStyle('annotation')}>
                  {curText||'✏ Note'}
                </button>
                <button onClick={()=>cpkToggleSub('partie')} style={subTabStyle('partie')}>
                  ¶ {(cur.sections[picker.si]?.measures[picker.mi]?.label)||'Partie'}
                </button>
              </div>

              {/* Sous-panneaux annotations */}
              {cpkSub==='signs'&&(
                <div style={{marginTop:8,padding:'10px 12px',background:'rgba(42,90,42,0.18)',
                  borderRadius:10,border:'1.5px solid rgba(60,120,60,0.3)'}}>
                  <div style={{fontSize:9,color:'#6AAA6A',fontWeight:700,marginBottom:7,letterSpacing:0.5}}>
                    Au-dessus du temps {sbi+1}
                  </div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                    {SIGN_TYPES.map(st=>{
                      const active=curSigns.includes(st.id);
                      return(
                        <button key={st.id} onClick={()=>cpkUpdBeat({s:active?curSigns.filter(x=>x!==st.id):[...curSigns,st.id]})}
                          style={{...B,height:32,borderRadius:8,padding:'0 10px',fontSize:11,fontWeight:700,
                            background:active?'#2A5A2A':'transparent',color:active?'#A0E0A0':IC,
                            outline:`1.5px solid ${active?'#3A8A3A':BC}`,whiteSpace:'nowrap'}}>
                          {st.label}
                        </button>
                      );
                    })}
                  </div>
                </div>
              )}
              {cpkSub==='volta'&&(
                <div style={{marginTop:8,padding:'10px 12px',background:'rgba(30,30,50,0.5)',
                  borderRadius:10,border:'1.5px solid #3A3A5A'}}>
                  <div style={{fontSize:9,color:'#8A8ABE',fontWeight:700,marginBottom:7}}>
                    Crochet — temps {sbi+1}
                  </div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:isCustomVolta?8:0}}>
                  {[{v:null,l:'Aucun'},...['1','2','3'].map(v=>({v,l:`${v}.`})),{v:'',l:'Perso.'}].map(opt=>{
                    const isAct=opt.v===null?curVolta===null:(opt.v===''?isCustomVolta:curVolta===opt.v&&!isCustomVolta);
                    return(
                      <button key={String(opt.v)} onClick={()=>{
                          if(opt.v===null)cpkUpdBeat({v:null});
                          else if(opt.v===''&&!isCustomVolta)cpkUpdBeat({v:''});
                          else if(opt.v!=='')cpkUpdBeat({v:opt.v});
                        }}
                        style={{...B,height:32,borderRadius:8,padding:'0 10px',fontSize:opt.v&&opt.v!==''?13:11,fontWeight:700,
                          background:isAct?'#2A2A5A':'transparent',color:isAct?'#AAAAEE':IC,
                          outline:`1.5px solid ${isAct?'#4A4A8A':BC}`,whiteSpace:'nowrap'}}>
                        {opt.l}
                      </button>
                    );
                  })}
                </div>
                {isCustomVolta&&(
                  <input value={curVolta||''} onChange={e=>cpkUpdBeat({v:e.target.value})}
                    placeholder="Ex : A, Bis…"
                    style={{width:'100%',background:'#2A2830',border:'1.5px solid #4A4860',
                      borderRadius:8,padding:'8px 12px',fontSize:12,color:AC,outline:'none',
                      boxSizing:'border-box',fontFamily:'inherit'}}/>
                )}
              </div>
            )}
              {cpkSub==='annotation'&&(
                <div style={{marginTop:8,padding:'10px 12px',background:'rgba(60,40,20,0.4)',
                  borderRadius:10,border:'1.5px solid #5A3E20'}}>
                  <div style={{fontSize:9,color:'#B07840',fontWeight:700,marginBottom:7}}>
                    Annotation — temps {sbi+1}
                  </div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
                    {TEXT_SUGG.map(s=>(
                      <button key={s} onClick={()=>cpkUpdBeat({t:curText===s?'':s})}
                        style={{...B,height:30,borderRadius:8,padding:'0 9px',fontSize:10,fontWeight:700,
                          background:curText===s?'#5A3A10':'transparent',color:curText===s?'#F0B060':IC,
                          outline:`1.5px solid ${curText===s?'#8A5A20':BC}`,whiteSpace:'nowrap'}}>
                        {s}
                      </button>
                    ))}
                  </div>
                  <input value={curText} onChange={e=>cpkUpdBeat({t:e.target.value})}
                    placeholder="Solo, Intro, Refrain…"
                    style={{width:'100%',background:'#2A2010',border:'1.5px solid #5A3E20',
                      borderRadius:8,padding:'8px 12px',fontSize:12,color:AC,outline:'none',
                      boxSizing:'border-box',fontFamily:'inherit'}}/>
                </div>
              )}
              {cpkSub==='partie'&&(
                <div style={{marginTop:8,padding:'10px 12px',background:'rgba(20,30,55,0.55)',
                  borderRadius:10,border:'1.5px solid #2A4070'}}>
                  <div style={{fontSize:9,color:'#7090C0',fontWeight:700,marginBottom:7,letterSpacing:0.5}}>
                    Étiquette de partie — mesure {picker.mi+1}
                  </div>
                  <div style={{display:'flex',gap:5,flexWrap:'wrap',marginBottom:8}}>
                    {['A','B','C','D','E','F','G','V','Intro','Outro','Bridge','Coda'].map(n=>{
                      const curLabel=(cur.sections[picker.si]?.measures[picker.mi]?.label)||'';
                      return(
                        <button key={n} onClick={()=>setMeasureLabel(picker.si,picker.mi,curLabel===n?'':n)}
                          style={{...B,height:30,borderRadius:8,padding:'0 10px',fontSize:11,fontWeight:700,
                            background:curLabel===n?'#1A3060':'transparent',color:curLabel===n?'#90BEFF':IC,
                            outline:`1.5px solid ${curLabel===n?'#2A5090':BC}`,whiteSpace:'nowrap'}}>
                          {n}
                        </button>
                      );
                    })}
                  </div>
                  <input value={(cur.sections[picker.si]?.measures[picker.mi]?.label)||''}
                    onChange={e=>setMeasureLabel(picker.si,picker.mi,e.target.value)}
                    placeholder="Nom libre (Verse, Chorus…)"
                    style={{width:'100%',background:'#1A1E28',border:'1.5px solid #2A4070',
                      borderRadius:8,padding:'8px 12px',fontSize:12,color:AC,outline:'none',
                      boxSizing:'border-box',fontFamily:'inherit'}}/>
                </div>
              )}

            </>)}

          </div>
        );
      })()}

      {insertSheet!==null&&(<InsertSectionSheet
        onInsert={(type,name)=>{insertSection(insertSheet,type,name);setInsertSheet(null);}}
        onClose={()=>setInsertSheet(null)}/>)}

      {barlinePick&&(<BarlinePanel
        si={barlinePick.si} mi={barlinePick.mi}
        currentBarType={barlinePick.side==='right'
          ?(cur.sections[barlinePick.si]?.measures[barlinePick.mi]?.barAfter||'normal')
          :(barlinePick.mi===0?(cur.sections[barlinePick.si]?.startBar||'normal'):(cur.sections[barlinePick.si]?.measures[barlinePick.mi-1]?.barAfter||'normal'))}
        measure={cur.sections[barlinePick.si]?.measures[barlinePick.mi]}
        onSelectBarline={t=>updateBarline(barlinePick.si,barlinePick.mi,barlinePick.side,t)}
        onAction={a=>{setBarlinePick(null);handleMeasureAction(barlinePick.si,barlinePick.mi,a);}}
        onClose={()=>setBarlinePick(null)}/>)}

    </div>

    {/* ── Panneau dessin flottant ── */}
    {drawMode&&(
      <div style={{position:'absolute',bottom:barsVisible?BOTTOMBAR_H+8:8,left:8,right:8,
        background:'rgba(30,28,26,0.95)',backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)',
        borderRadius:16,padding:'10px 14px',display:'flex',alignItems:'center',gap:8,
        flexWrap:'wrap',zIndex:200,boxShadow:'0 4px 24px rgba(0,0,0,0.35)'}}>

        {/* Toggle Crayon / Marqueur */}
        {[{v:'crayon',l:'✒ Crayon'},{v:'marqueur',l:'☆ Marqueur'}].map(t=>(
          <button key={t.v} onClick={()=>{
              setDrawTool(t.v);
              if(t.v==='marqueur'){if(drawWidth<8)setDrawWidth(14);setDrawColor('#FFE033');}
              if(t.v==='crayon'){if(drawWidth>=8)setDrawWidth(2);setDrawColor('#F2EDE4');}
            }}
            style={{background:drawTool===t.v?'#F2EDE4':'transparent',
              color:drawTool===t.v?'#1A1A1A':'#A09A90',
              border:`1.5px solid ${drawTool===t.v?'#F2EDE4':'#4A4540'}`,
              borderRadius:100,padding:'3px 11px',fontSize:11,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',transition:'all 0.1s',whiteSpace:'nowrap'}}>{t.l}</button>
        ))}

        <div style={{width:1,height:18,background:'#4A4540',flexShrink:0}}/>

        {/* Épaisseur — adaptée à l'outil */}
        {(drawTool==='crayon'
          ?[{v:1,l:'Fine'},{v:2,l:'Moy'},{v:4,l:'Épais'}]
          :[{v:10,l:'Fine'},{v:14,l:'Moy'},{v:20,l:'Épais'}]
        ).map(opt=>(
          <button key={opt.v} onClick={()=>setDrawWidth(opt.v)}
            style={{background:drawWidth===opt.v?'#F2EDE4':'transparent',
              color:drawWidth===opt.v?'#1A1A1A':'#A09A90',
              border:`1.5px solid ${drawWidth===opt.v?'#F2EDE4':'#4A4540'}`,
              borderRadius:100,padding:'3px 9px',fontSize:11,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',transition:'all 0.1s'}}>{opt.l}</button>
        ))}

        <div style={{width:1,height:18,background:'#4A4540',flexShrink:0}}/>

        {/* Couleurs — adaptées à l'outil */}
        {(drawTool==='crayon'
          ?['#F2EDE4','#C0392B','#3A9BD5','#2ECC71','#F39C12']
          :['#FFE033','#FF6EC7','#7DFFB3','#6EC6FF','#FF8C42']
        ).map(col=>(
          <button key={col} onClick={()=>setDrawColor(col)}
            style={{width:20,height:20,
              borderRadius:drawTool==='marqueur'?4:'50%',
              background:col,border:'2px solid transparent',cursor:'pointer',flexShrink:0,
              boxShadow:drawColor===col?`0 0 0 2px #1A1A1A, 0 0 0 4px ${col}`:'none',
              transition:'box-shadow 0.12s'}}/>
        ))}

        <div style={{flex:1}}/>

        <button onClick={undoDraw}
          style={{background:'transparent',border:'1.5px solid #4A4540',borderRadius:100,
            padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#A09A90',fontWeight:600}}>↩</button>

        <button onClick={clearPageDraw}
          style={{background:'transparent',border:'1.5px solid #C0392B',borderRadius:100,
            padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#C0392B',fontWeight:600}}>Effacer</button>

        <button onClick={()=>setDrawMode(false)}
          style={{background:'#F2EDE4',border:'none',borderRadius:100,
            padding:'4px 14px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#1A1A1A',fontWeight:700}}>✕</button>
      </div>
    )}

    {/* BOTTOM BAR — navigation pages + actions */}
    <div style={{background:'rgba(255,255,255,0.92)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
      borderTop:'0.5px solid rgba(0,0,0,0.1)',height:BOTTOMBAR_H,
      display:fullscreen?'none':'flex',alignItems:'center',padding:'0 12px',gap:8,flexShrink:0,
      paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
      {/* ↩ Annuler */}
      <button onClick={undo} disabled={undoStack.current.length===0}
        style={{background:'transparent',border:'1.5px solid #D0CAC0',borderRadius:100,
          padding:'4px 10px',fontSize:11,cursor:undoStack.current.length===0?'default':'pointer',
          fontFamily:'inherit',color:undoStack.current.length===0?'#C0BAB0':'#6B6560',fontWeight:600,
          flexShrink:0,opacity:undoStack.current.length===0?0.45:1,transition:'opacity 0.15s'}}>
        ↩ Annuler
      </button>
      <div style={{width:1,height:20,background:'#D0CAC0',flexShrink:0}}/>
      {/* Prev */}
      <button onClick={()=>setCurrentPage(p=>Math.max(0,p-1))} disabled={safePage===0}
        style={{background:'transparent',border:'none',color:safePage===0?'#B0A8A0':'#1A1A1A',
          fontSize:28,fontWeight:700,cursor:safePage===0?'default':'pointer',padding:'0 6px',lineHeight:1,fontFamily:'inherit',opacity:safePage===0?0.4:1}}>
        ‹
      </button>
      {/* Dots */}
      <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center',gap:6}}>
        {Array.from({length:totalPages}).map((_,i)=>(
          <button key={i} onClick={()=>setCurrentPage(i)}
            style={{width:safePage===i?20:7,height:7,borderRadius:4,
              background:safePage===i?'#1A1A1A':'#C0BAB0',
              border:'none',cursor:'pointer',padding:0,transition:'all 0.15s'}}/>
        ))}
        {totalPages>1&&(
          <span style={{fontSize:10,color:'#8A847C',marginLeft:4}}>
            {safePage+1}/{totalPages}
          </span>
        )}
      </div>
      {/* Next */}
      <button onClick={()=>setCurrentPage(p=>Math.min(totalPages-1,p+1))} disabled={safePage===totalPages-1}
        style={{background:'transparent',border:'none',color:safePage===totalPages-1?'#B0A8A0':'#1A1A1A',
          fontSize:28,fontWeight:700,cursor:safePage===totalPages-1?'default':'pointer',padding:'0 6px',lineHeight:1,fontFamily:'inherit',opacity:safePage===totalPages-1?0.4:1}}>
        ›
      </button>
      {editMode&&<>
        <div style={{width:1,height:20,background:'#D0CAC0',flexShrink:0}}/>
        {/* + Section */}
        <button onClick={()=>setInsertSheet(cur.sections.length)}
          style={{background:'transparent',border:'1.5px solid #D0CAC0',borderRadius:100,
            padding:'4px 11px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#6B6560',fontWeight:600,display:'flex',alignItems:'center',gap:3}}>
          <span style={{fontSize:14,lineHeight:1}}>+</span><span>Section</span>
        </button>
      </>}
    </div>
  </div>);
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('home');
  const [library,setLibrary]=useState(LIBRARY_INIT);
  const [pieceId,setPieceId]=useState(1);
  const [displayKey,setDisplayKey]=useState('Bb');
  const [displayMode,setDisplayMode]=useState('maj');
  const [prefs,setPrefs]=useState(loadPrefs);
  function updatePrefs(p){setPrefs(p);savePrefs(p);}
  const piece=library.find(p=>p.id===pieceId)||library[0];
  function selectPiece(p){setPieceId(p.id);setDisplayKey(p.key);setView('editor');}
  function createPiece(){
    const newId=Date.now();
    const newPiece={id:newId,title:'Nouveau morceau',composer:'',key:'C',bpm:120,style:'',timeSig:'4/4',
      sections:[{name:'A',type:'grid',startBar:'normal',
        measures:[mk(['C']),mk(['C']),mk(['C']),mk(['C'])]}]};
    setLibrary(lib=>[...lib,newPiece]);
    setPieceId(newId);setDisplayKey('C');setView('editor');
  }
  function importPiece(parsed){
    const newId=Date.now();
    const newPiece={id:newId,...parsed};
    setLibrary(lib=>[...lib,newPiece]);
    setPieceId(newId);setDisplayKey(parsed.key||'C');setView('editor');
  }
  if(view==='home')    return <HomeScreen    onNavigate={v=>setView(v)}/>;
  if(view==='library') return <LibraryScreen library={library} activePieceId={pieceId} onSelect={selectPiece} onBack={()=>setView('home')} onCreate={createPiece} onImport={importPiece}/>;
  if(view==='prefs')   return <PreferencesScreen prefs={prefs} onUpdate={updatePrefs} onBack={()=>setView('home')}/>;
  if(view==='editor')  return <EditorScreen  library={library} setLibrary={setLibrary} piece={piece} displayKey={displayKey} setDisplayKey={setDisplayKey} displayMode={displayMode} setDisplayMode={setDisplayMode} onBack={()=>setView('library')} prefs={prefs}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    // Forcer la mise à jour du SW au chargement
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.update());
    });
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js',{updateViaCache:'none'}).then(reg=>{
        reg.update();
      }).catch(()=>{});
    });
  }
</script>
</body>
</html>
