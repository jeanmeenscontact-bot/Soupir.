  function updateBarline(si,mi,side,type){
    saveUndo();
    setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
      sections:p.sections.map((s,sI)=>{
        if(sI!==si)return s;
        if(side==='right')return{...s,measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,barAfter:type})};
        if(mi===0)return{...s,startBar:type};
        return{...s,measures:s.measures.map((mm,mI)=>mI!==(mi-1)?mm:{...mm,barAfter:type})};
      })
    }));
    setBarlinePick(null);
  }

  function handleMeasureAction(si,mi,action){
    saveUndo();
    if(action==='addChord'){
      const mm0=cur.sections[si].measures[mi];
      const beats0=getBeats(mm0);
      const firstEmpty=beats0.findIndex(b=>!b.c);
      if(firstEmpty===-1)return; // tous les temps remplis
      const lastFilled=[...beats0].reverse().find(b=>b.c);
      const srcChord=lastFilled?.c||'C';
      const nb=beats0.map((b,i)=>i===firstEmpty?{...b,c:srcChord}:b);
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,beats:nb,chords:nb.map(b=>b.c).filter(c=>c)})
        })
      }));
    }
    else if(action==='removeChord'){
      const mm0=cur.sections[si].measures[mi];
      const beats0=getBeats(mm0);
      const filledIdxs=beats0.map((b,i)=>b.c?i:-1).filter(i=>i>=0);
      if(filledIdxs.length<=1)return;
      const lastIdx=filledIdxs[filledIdxs.length-1];
      const nb=beats0.map((b,i)=>i===lastIdx?mkBeat():b);
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,beats:nb,chords:nb.map(b=>b.c).filter(c=>c)})
        })
      }));
    }
    else if(action==='split'){
      const srcBeats=getBeats(cur.sections[si].measures[mi]);
      const srcChord=srcBeats.find(b=>b.c)?.c||'C';
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,split2:mkSplit2([srcChord])})
        })
      }));
    }
    else if(action==='unsplit'){
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:s.measures.map((mm,mI)=>mI!==mi?mm:{...mm,split2:null})
        })
      }));
    }
    else if(action==='addMeasure'||action==='addAfter'){
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:[...s.measures.slice(0,mi+1),mk([]),...s.measures.slice(mi+1)]
        })
      }));
    }
    else if(action==='addBefore'){
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,
          measures:[...s.measures.slice(0,mi),mk([]),...s.measures.slice(mi)]
        })
      }));
    }
    else if(action==='deleteMeasure'){
      const sec=cur.sections[si];
      if(sec.measures.length<=1)return;
      saveUndo();
      // Si c'est un master de grande mesure (barAfter==='none'), supprimer aussi la continuation
      const isMasterGM=sec.measures[mi]?.barAfter==='none';
      const contMi=isMasterGM?mi+1:null;
      // Si c'est une continuation, supprimer aussi le master
      const prevM=mi>0?sec.measures[mi-1]:null;
      const isCont=!!(prevM&&prevM.barAfter==='none');
      const masterMi=isCont?mi-1:null;
      const toDelete=new Set([mi]);
      if(contMi!=null&&contMi<sec.measures.length)toDelete.add(contMi);
      if(masterMi!=null)toDelete.add(masterMi);
      if(sec.measures.length-toDelete.size<1)return; // garder au moins 1
      setLibrary(lib=>lib.map(p=>p.id!==piece.id?p:{...p,
        sections:p.sections.map((s,sI)=>sI!==si?s:{...s,measures:s.measures.filter((_,mI)=>!toDelete.has(mI))})
      }));
    }
  }

  function addMeasureAtEnd(si){
    saveUndo();
    setLibrary(lib=>lib.map(p=>{
      if(p.id!==piece.id)return p;
      return{...p,sections:p.sections.map((s,sI)=>{
        if(sI!==si)return s;
        return{...s,measures:[...s.measures,mk([])]};
      })};
    }));
  }

  function getDisp(chord){
    if(!degreeMode)return applyPrefs(chord,prefs);
    return chordToDeg(chord,displayKey)||applyPrefs(chord,prefs)+'✱';
  }

  // ── Rendu d'une demi-case — positionnement par temps ──────────────────────────
  // num = numéro de mesure (null pour half B d'un split)
  function renderHalf(mm,half,si,mi,num){
    const data=half==='b'?mm.split2:mm;
    const beats=getBeats(data);
    const nFilled=beats.filter(b=>b.c).length||1;
    // Taille adaptative : 4 beats = légèrement réduit, 1 beat = pleine taille
    const chFs=nFilled>=4?Math.round(chordFsBase*0.82)
              :nFilled===3?Math.round(chordFsBase*0.88)
              :nFilled===2?Math.round(chordFsBase*0.93)
              :chordFsBase;
    const VOLTA_H=15;

    const isSel=editMode&&picker.visible&&!picker.isGrande&&picker.si===si&&picker.mi===mi&&picker.half===(half||'a');
    return(
      <div style={{flex:1,display:'flex',minWidth:0,position:'relative',
        background:isSel?'rgba(58,155,213,0.09)':'transparent',
        transition:'background 0.12s'}}>

        {/* ── 4 colonnes de temps ── */}
        {beats.map((beat,bi)=>{
          const chord=beat.c||'';
          const hasChord=!!chord;
          const hasVolta=!!beat.v;
          const hasSigns=beat.s&&beat.s.length>0;
          const hasText=!!beat.t;
          const spec=isSpec(chord);
          const idem=chord==='%';
          const isDia=!spec&&!idem&&hasChord&&chordToDeg(chord,displayKey)!==null;
          const disp=spec?chord:(idem?'%':getDisp(chord));
          const chColor=idem?'#C7C2BC':(degreeMode&&!spec?(isDia?'#1A1A1A':'#8A3020'):'#1A1A1A');
          // Réduction de police pour les accords longs (évite débordement)
          const dispLen=disp?disp.replace(/[♭♯%]/g,'xx').length:0;
          const lenScale=dispLen>=8?0.76:dispLen>=7?0.83:dispLen>=6?0.90:dispLen>=5?0.95:1;
          const effectiveFs=Math.round(chFs*lenScale);
          return(
            <div key={bi}
              onClick={editMode?(e)=>{e.stopPropagation();openMeasurePicker(si,mi,half,e,bi);}:undefined}
              style={{flex:1,minWidth:0,overflow:'hidden',position:'relative',cursor:editMode?'pointer':'default'}}>
              {/* Crochet de volta — absolu */}
              {hasVolta&&(
                <div style={{position:'absolute',top:0,left:0,right:0,height:VOLTA_H,
                  borderLeft:`2px solid ${INK_ACCENT}`,borderTop:`2px solid ${INK_ACCENT}`,
                  display:'flex',alignItems:'flex-start',paddingLeft:3,paddingTop:2,
                  pointerEvents:'none',zIndex:2}}>
                  <span style={{fontSize:8,fontWeight:900,color:INK_ACCENT,lineHeight:1,fontStyle:'italic'}}>
                    {beat.v}.
                  </span>
                </div>
              )}
              {/* Signes — absolu */}
              {hasSigns&&(
                <div style={{position:'absolute',top:hasVolta?VOLTA_H+1:2,left:0,right:0,
                  display:'flex',justifyContent:'center',pointerEvents:'none',zIndex:2}}>
                  <span style={{fontSize:8,color:SIGN_COLOR,fontWeight:900,
                    background:SIGN_COLOR+'18',borderRadius:2,padding:'1px 3px',lineHeight:1}}>
                    {beat.s.map(s=>{const st=SIGN_TYPES.find(x=>x.id===s);return st?st.sym:s;}).join(' ')}
                  </span>
                </div>
              )}
              {/* Accord — absolu, collé à gauche, centré verticalement */}
              {hasChord&&(
                <span style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',
                  background:degreeMode&&!isDia&&!spec&&!idem?'#F5DDD8':'transparent',
                  borderRadius:4,lineHeight:1,display:'inline-flex',alignItems:'center'}}>
                  {spec?(<span style={{fontSize:effectiveFs,fontWeight:700,color:chColor,letterSpacing:'0.05em',lineHeight:1}}>{disp}</span>)
                  :idem?(<span style={{fontSize:Math.round(effectiveFs*1.1),fontWeight:200,color:chColor,letterSpacing:'0.08em',lineHeight:1}}>%</span>)
                  :degreeMode?(<DegreeText deg={disp} fs={effectiveFs} color={chColor} weight={500}/>)
                  :(<ChordText chord={disp} fs={effectiveFs} color={chColor} weight={500}/>)}
                </span>
              )}
              {!hasChord&&editMode&&(
                <span style={{position:'absolute',left:0,top:'50%',transform:'translateY(-50%)',
                  fontSize:10,color:'#D0CAC0',fontWeight:300,lineHeight:1,userSelect:'none'}}>·</span>
              )}
              {/* Annotation — absolu en bas */}
              {hasText&&(
                <div style={{position:'absolute',bottom:2,left:0,right:0,
                  textAlign:'center',fontSize:8,fontStyle:'italic',
                  fontWeight:700,color:'#9A7050',lineHeight:1.2,
                  overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                  pointerEvents:'none',zIndex:2}}>
                  {beat.t}
                </div>
              )}
            </div>
          );
        })}
      </div>
    );
  }

      <button onClick={()=>setShowKeyPicker(true)} className="icon-btn"

        <span style={{fontSize:9,color:'#8A847C',fontWeight:600}}>Ton.</span>
        <span style={{fontSize:12,fontWeight:800}}>{displayKey}{displayMode==='min'?'m':''}</span>
      </button>
      <button onClick={()=>setDegreeMode(d=>!d)}
        style={{background:degreeMode?'#1A1A1A':'transparent',border:'1.5px solid #1A1A1A',color:degreeMode?'#F2EDE4':'#1A1A1A',
          padding:'3px 9px',borderRadius:100,fontSize:10,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',flexShrink:0,fontFamily:'inherit'}}>
        {degreeMode?'Degrés':'Acc.'}
      </button>
      <div style={{display:'flex',alignItems:'center',gap:4,background:'#F5F2EC',border:'1.5px solid #D0CAC0',borderRadius:100,padding:'3px 7px',flexShrink:0}}>
        <div style={{display:'flex',gap:2}}>
          {[0,1,2,3].map(i=>(<div key={i} style={{width:4,height:4,borderRadius:'50%',transition:'all 0.06s',
            background:metroOn&&beat===i?(i===0?'#1A1A1A':'#6B6560'):'#C0BAB0',
            transform:metroOn&&beat===i?'scale(1.35)':'scale(1)'}}/>))}
        </div>
        <input type="number" value={bpm} min={40} max={300} onChange={e=>setBpm(Number(e.target.value))}
          style={{width:30,background:'transparent',border:'none',color:'#1A1A1A',fontSize:11,fontWeight:700,textAlign:'center',outline:'none',fontFamily:'inherit'}}/>
        <button onClick={()=>setMetroOn(m=>!m)}
          style={{background:metroOn?'#1A1A1A':'transparent',border:`1.5px solid ${metroOn?'#1A1A1A':'#C0BAB0'}`,
            color:metroOn?'#F2EDE4':'#8A847C',width:18,height:18,borderRadius:'50%',cursor:'pointer',
            fontSize:7,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'inherit'}}>
          {metroOn?'■':'▶'}
        </button>
      </div>
      <button onClick={()=>setShowDegrees(v=>!v)}
        style={{background:showDegrees?'#1A1A1A':'transparent',border:`1.5px solid ${showDegrees?'#1A1A1A':'#D0CAC0'}`,
          color:showDegrees?'#F2EDE4':'#8A847C',height:26,borderRadius:100,cursor:'pointer',
          fontSize:9,fontWeight:700,padding:'0 7px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontFamily:'inherit',whiteSpace:'nowrap'}}>Gamme</button>
    </div>

    {/* CONTENT — page plein écran, zéro scroll */}
    <div style={{flex:1,overflow:'hidden',position:'relative',background:'#F2F0EB',display:'flex',flexDirection:'column'}}>

      {/* Bandeau titre + sélecteur Lecture/Édition */}
      <div style={{display:fullscreen?'none':'flex',alignItems:'center',padding:'0 10px',gap:8,borderBottom:'0.5px solid #D0CCC4',
        background:'rgba(252,250,246,0.95)',height:INFO_H,flexShrink:0}}>
        <span style={{fontSize:13,fontWeight:800,letterSpacing:'-0.4px',color:'#1C1C1E',flex:1,
          overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{cur.title}</span>
        {degreeMode&&<span style={{fontSize:9,fontWeight:700,color:'#4A3F2F',background:'#F5DDD8',
          borderRadius:4,padding:'1px 5px',flexShrink:0}}>Degrés</span>}
        {/* Bouton dessin */}
        <button onClick={()=>setDrawMode(d=>!d)}
          style={{background:drawMode?'#1A1A1A':'transparent',
            border:`1.5px solid ${drawMode?'#1A1A1A':'#D0CAC0'}`,
            borderRadius:100,padding:'3px 10px',fontSize:12,cursor:'pointer',
            fontFamily:'inherit',color:drawMode?'#F2EDE4':'#8A847C',
            fontWeight:700,flexShrink:0,transition:'all 0.12s'}}>
          ✎
        </button>
        {/* Sélecteur Lecture / Édition */}
        <div style={{display:'flex',background:'#E2DDD6',borderRadius:8,padding:2,gap:1,flexShrink:0}}>
          <button onClick={()=>{setEditMode(false);setBarsVisible(true);}}
            style={{background:!editMode?'#FFFFFF':'transparent',border:'none',
              borderRadius:6,padding:'3px 9px',fontSize:10,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',color:!editMode?'#1A1A1A':'#8A847C',
              boxShadow:!editMode?'0 1px 3px rgba(0,0,0,0.12)':'none',transition:'all 0.12s'}}>
            👁 Lire
          </button>
          <button onClick={()=>{setEditMode(true);setBarsVisible(true);}}
            style={{background:editMode?'#1A1A1A':'transparent',border:'none',
              borderRadius:6,padding:'3px 9px',fontSize:10,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',color:editMode?'#F2EDE4':'#8A847C',
              boxShadow:editMode?'0 1px 3px rgba(0,0,0,0.12)':'none',transition:'all 0.12s'}}>
            ✏ Éditer
          </button>
        </div>
      </div>

      {/* Grille pages */}
      <div onClick={!editMode&&!drawMode?()=>setBarsVisible(v=>!v):undefined}
        style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden',background:'#FFFFFF',
          position:'relative',cursor:!editMode&&!drawMode?'pointer':undefined}}>
        {/* Pre-pass : détecter les rows dont la section se termine à pleine capacité
            → le "+" doit apparaître au début de la row suivante, ou dans la 1re ligne vide */}
        {(()=>{
          if(editMode){
            pageRows._addSiForFiller=null;
            pageRows.forEach((row,ri)=>{
              if(row.rowType!=='measures')return;
              const lc=row.cells[row.cells.length-1];
              if(!lc||lc.type!=='measure')return;
              const sec=cur.sections[lc.si];
              if(sec?.type&&sec.type!=='grid')return;
              if(lc.mi===sec.measures.length-1&&!lc.isContinuation&&row.cells.length===GCOLS){
                // tag la row suivante si elle existe, sinon la 1re ligne vide
                const nextRow=pageRows[ri+1];
                if(nextRow)nextRow._addMeasureSi=lc.si;
                else pageRows._addSiForFiller=lc.si;
              }
            });
          }
          return null;
        })()}
        {pageRows.map((row,ri)=>{
          if(row.rowType==='staff'){
            const item=row.cells[0];
            return(
              <div key={ri} style={{flexShrink:0,overflow:'auto',borderBottom:'0.5px solid #D0CCC4'}}>
                <StaffSectionView section={item.section}
                  editMode={editMode}
                  onUpdate={ns=>updateStaffSection(item.si,ns)}
                  onDelete={cur.sections.length>1?()=>deleteSection(item.si):null}/>
              </div>
            );
          }
          if(row.rowType==='tab'){
            const item=row.cells[0];
            return(
              <div key={ri} style={{flexShrink:0,overflow:'auto',borderBottom:'0.5px solid #D0CCC4'}}>
                <TabSectionView section={item.section}
                  editMode={editMode}
                  onUpdate={ns=>updateTabSection(item.si,ns)}
                  onDelete={cur.sections.length>1?()=>deleteSection(item.si):null}/>
              </div>
            );
          }
          const firstCell=row.cells[0];
          // Détecter si la dernière cellule réelle est la fin d'une section grille (row non-plein)
          const lastRealCell=row.cells[row.cells.length-1];
          const lastRealSi=lastRealCell?.si;
          const lastRealSection=lastRealSi!=null?cur.sections[lastRealSi]:null;
          const isLastOfSection=editMode&&lastRealSection&&
            (!lastRealSection.type||lastRealSection.type==='grid')&&
            lastRealCell.mi===lastRealSection.measures.length-1&&
            !lastRealCell.isContinuation&&row.cells.length<GCOLS;
          // "+" en début de row : provient d'une section terminée en row pleine
          const addSiAtStart=editMode?row._addMeasureSi:null;
          return(
            <div key={ri} style={{flex:1,display:'flex',alignItems:'stretch',position:'relative',
              borderBottom:'0.5px solid rgba(0,0,0,0.07)',minHeight:0,overflow:'visible'}}>
              {/* Barre gauche — avec badge "+" si la section précédente se termine ici */}
              <div style={{position:'relative',display:'flex',flexShrink:0}}>
                <Barline
                  type={firstCell.mi===0?(cur.sections[firstCell.si].startBar||'normal'):'normal'}
                  onClick={editMode?(e)=>{e.stopPropagation();setBarlinePick({si:firstCell.si,mi:firstCell.mi,side:'left'});}:undefined}
                  minH={rowH} accentColor={INK_ACCENT}/>
                {addSiAtStart!=null&&(
                  <button onClick={()=>{addMeasureAtEnd(addSiAtStart);setCurrentPage(Math.ceil((allRows.length+1)/rowsPerPage)-1);}}
                    style={{position:'absolute',left:'50%',top:'50%',transform:'translate(-50%,-50%)',
                      width:26,height:26,background:'#F2F0EB',border:'1.5px solid #D0CAC0',borderRadius:'50%',
                      fontSize:18,cursor:'pointer',color:'#8A847C',display:'flex',alignItems:'center',
                      justifyContent:'center',fontWeight:300,padding:0,lineHeight:1,zIndex:20,
                      boxShadow:'0 1px 4px rgba(0,0,0,0.15)'}}>+</button>
                )}
              </div>
              {/* Mesures */}
              {(()=>{
                const rendered=[];let skip=false;
                // Suppression de mesure déplacée dans la MeasureSheet (tap sur mesure)
                row.cells.forEach((cell,ci)=>{
                  if(skip){skip=false;return;}
                  const{si,mi,measure,num,sectionStart,sectionName,isContinuation}=cell;
                  const isMaster=!isContinuation&&measure.barAfter==='none';
                  const nextCell=row.cells[ci+1];
                  const isGrande=isMaster&&nextCell&&nextCell.isContinuation;

                  // ── Grande mesure : master + continuation fusionnés ──────────────
                  if(isGrande){
                    skip=true;
                    const{si:cSi,mi:cMi,measure:cMm}=nextCell;
                    // Grande mesure : 8 beats (4 master + 4 cont), positionnés par temps
                    const masterBeats=getBeats(measure);
                    const contBeats=getBeats(cMm);
                    const allBeats=[
                      ...masterBeats.map((b,bi)=>({...b,key:`m${mi}-b${bi}`})),
                      ...contBeats.map((b,bi)=>({...b,key:`m${cMi}-b${bi}`})),
                    ];
                    const nFilled=allBeats.filter(b=>b.c).length||1;
                    const chFs=nFilled>=8?Math.round(chordFsBase*0.72)

        // Accord en cours d'affichage
        const root=picker.letter+(picker.acc==='#'?'#':picker.acc==='b'?'b':'');
        const dispChord=root?applyPrefs(buildChordStr(root,picker.qualityId,picker.extensions||[],bassStr),prefs):'—';
        return(
          <div style={{position:'absolute',bottom:0,left:0,right:0,zIndex:150,
            background:'rgba(26,24,22,0.97)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
            borderRadius:'16px 16px 0 0',padding:'11px 12px 16px',
            boxShadow:'0 -4px 24px rgba(0,0,0,0.4)'}}>

            {/* Ligne d'accord + toggle avancé + fermer */}
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:9}}>
              <span style={{fontSize:22,fontWeight:900,color:AC,letterSpacing:'-0.5px',flex:1,lineHeight:1}}>
                {dispChord}
              </span>
              <button onClick={()=>setPicker(pk=>({...pk,advanced:!pk.advanced}))}
                style={{...B,height:26,borderRadius:100,padding:'0 10px',fontSize:10,fontWeight:700,
                  background:adv?AC:'transparent',color:adv?'#1A1A1A':IC,
                  outline:`1.5px solid ${adv?AC:BC}`,flexShrink:0}}>
                {adv?'Compact':'⋯ Plus'}
              </button>
              <button onClick={()=>setPicker(pk=>({...pk,visible:false}))}
                style={{...B,height:26,borderRadius:100,padding:'0 12px',fontSize:10,fontWeight:700,
                  background:AC,color:'#1A1A1A',flexShrink:0}}>✕</button>
            </div>

            {/* Rangée 1 : beats + lettres + altérations */}
            <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:8,overflowX:'auto'}}>
              {(picker.localBeats||[]).map((_b,bi)=>(
                <button key={bi} onClick={()=>cpkBeat(bi)}
                  style={{...B,width:28,height:28,borderRadius:7,fontSize:10,fontWeight:700,
                    background:sbi===bi?AC:'transparent',color:sbi===bi?'#1A1A1A':IC,
                    outline:`1.5px solid ${sbi===bi?AC:BC}`,flexShrink:0}}>
                  {bi+1}
                </button>
              ))}
              <div style={{width:1,height:18,background:BC,flexShrink:0,margin:'0 1px'}}/>
              {LETTERS.map(l=>(
                <button key={l} onClick={()=>cpkNote(l,picker.acc)}
                  style={{...B,width:32,height:32,borderRadius:8,fontSize:15,fontWeight:700,
                    background:picker.letter===l?AC:'transparent',color:picker.letter===l?'#1A1A1A':IC,
                    outline:`1.5px solid ${picker.letter===l?AC:BC}`,flexShrink:0}}>
                  {l}
                </button>
              ))}
              <div style={{width:1,height:18,background:BC,flexShrink:0,margin:'0 1px'}}/>
              {[{v:'b',l:'♭'},{v:'',l:'♮'},{v:'#',l:'♯'}].map(a=>(
                <button key={a.v} onClick={()=>cpkNote(picker.letter,a.v)}
                  style={{...B,width:30,height:30,borderRadius:8,fontSize:13,fontWeight:700,
                    background:picker.acc===a.v?AC:'transparent',color:picker.acc===a.v?'#1A1A1A':IC,
                    outline:`1.5px solid ${picker.acc===a.v?AC:BC}`,flexShrink:0}}>
                  {a.l}
                </button>
              ))}
            </div>

            {/* Rangée 2 : qualités */}
            <div style={{display:'flex',alignItems:'center',gap:5,overflowX:'auto',
              paddingBottom:adv?0:2,marginBottom:adv?6:0}}>
              {CQUALITIES.map(q=>(
                <button key={q.id} onClick={()=>cpkQual(q.id)}
                  style={{...B,height:32,borderRadius:7,padding:'0 10px',fontSize:12,fontWeight:700,
                    whiteSpace:'nowrap',flexShrink:0,
                    background:picker.qualityId===q.id?AC:'transparent',
                    color:picker.qualityId===q.id?'#1A1A1A':IC,
                    outline:`1.5px solid ${picker.qualityId===q.id?AC:BC}`}}>
                  {q.l}
                </button>
              ))}
            </div>

            {/* Mode avancé : extensions + basse */}
            {adv&&(<>
              {secLbl('Extensions')}
              <div style={{display:'flex',alignItems:'center',gap:5,overflowX:'auto',marginBottom:2}}>
                {EXTENSIONS.map(e=>{
                  const active=(picker.extensions||[]).includes(e.id);
                  return(
                    <button key={e.id} onClick={()=>cpkExt(e.id)}
                      style={{...B,height:30,borderRadius:7,padding:'0 9px',fontSize:11,fontWeight:700,
                        whiteSpace:'nowrap',flexShrink:0,
                        background:active?'#3A9BD5':'transparent',
                        color:active?'#FFFFFF':IC,
                        outline:`1.5px solid ${active?'#3A9BD5':BC}`}}>
                      {e.label}
                    </button>
                  );
                })}
                {(picker.extensions||[]).length>0&&(
                  <button onClick={()=>{
                    const root=picker.letter+(picker.acc==='#'?'#':picker.acc==='b'?'b':'');
                    const chord=buildChordStr(root,picker.qualityId,[],bassStr);
                    const newBeats=(picker.localBeats||[]).map((b,i)=>i!==sbi?b:{...b,c:chord});
                    const np={...picker,extensions:[],localBeats:newBeats};
                    setPicker(np);applyMeasureLive(np);
                  }} style={{...B,height:30,borderRadius:7,padding:'0 9px',fontSize:10,fontWeight:600,
                    whiteSpace:'nowrap',flexShrink:0,background:'transparent',color:'#C0392B',
                    outline:`1.5px solid #C0392B`}}>✕ Effacer</button>
                )}
              </div>
              {secLbl('Basse')}
              <div style={{display:'flex',alignItems:'center',gap:5,overflowX:'auto'}}>
                {LETTERS.map(l=>(
                  <button key={l} onClick={()=>cpkBassNote(l)}
                    style={{...B,width:32,height:32,borderRadius:8,fontSize:15,fontWeight:700,
                      background:picker.bass===l?'#F39C12':'transparent',
                      color:picker.bass===l?'#1A1A1A':IC,
                      outline:`1.5px solid ${picker.bass===l?'#F39C12':BC}`,flexShrink:0}}>
                    {l}
                  </button>
                ))}
                {picker.bass&&(<>
                  <div style={{width:1,height:18,background:BC,flexShrink:0,margin:'0 1px'}}/>
                  {[{v:'b',l:'♭'},{v:'',l:'♮'},{v:'#',l:'♯'}].map(a=>(
                    <button key={a.v} onClick={()=>cpkBassAcc(a.v)}
                      style={{...B,width:30,height:30,borderRadius:8,fontSize:13,fontWeight:700,
                        background:picker.bassAcc===a.v?'#F39C12':'transparent',
                        color:picker.bassAcc===a.v?'#1A1A1A':IC,
                        outline:`1.5px solid ${picker.bassAcc===a.v?'#F39C12':BC}`,flexShrink:0}}>
                      {a.l}
                    </button>
                  ))}
                </>)}
              </div>
            </>)}
          </div>
        );
      })()}

      {insertSheet!==null&&(<InsertSectionSheet
        onInsert={(type,name)=>{insertSection(insertSheet,type,name);setInsertSheet(null);}}
        onClose={()=>setInsertSheet(null)}/>)}

      {barlinePick&&(<BarlinePanel
        si={barlinePick.si} mi={barlinePick.mi}
        currentBarType={barlinePick.side==='right'
          ?(cur.sections[barlinePick.si]?.measures[barlinePick.mi]?.barAfter||'normal')
          :(barlinePick.mi===0?(cur.sections[barlinePick.si]?.startBar||'normal'):(cur.sections[barlinePick.si]?.measures[barlinePick.mi-1]?.barAfter||'normal'))}
        measure={cur.sections[barlinePick.si]?.measures[barlinePick.mi]}
        onSelectBarline={t=>updateBarline(barlinePick.si,barlinePick.mi,barlinePick.side,t)}
        onAction={a=>{setBarlinePick(null);handleMeasureAction(barlinePick.si,barlinePick.mi,a);}}
        onClose={()=>setBarlinePick(null)}/>)}

    </div>

    {/* ── Panneau dessin flottant ── */}
    {drawMode&&(
      <div style={{position:'absolute',bottom:barsVisible?BOTTOMBAR_H+8:8,left:8,right:8,
        background:'rgba(30,28,26,0.95)',backdropFilter:'blur(18px)',WebkitBackdropFilter:'blur(18px)',
        borderRadius:16,padding:'10px 14px',display:'flex',alignItems:'center',gap:8,
        flexWrap:'wrap',zIndex:200,boxShadow:'0 4px 24px rgba(0,0,0,0.35)'}}>

        {/* Toggle Crayon / Marqueur */}
        {[{v:'crayon',l:'✒ Crayon'},{v:'marqueur',l:'☆ Marqueur'}].map(t=>(
          <button key={t.v} onClick={()=>{
              setDrawTool(t.v);
              if(t.v==='marqueur'){if(drawWidth<8)setDrawWidth(14);setDrawColor('#FFE033');}
              if(t.v==='crayon'){if(drawWidth>=8)setDrawWidth(2);setDrawColor('#F2EDE4');}
            }}
            style={{background:drawTool===t.v?'#F2EDE4':'transparent',
              color:drawTool===t.v?'#1A1A1A':'#A09A90',
              border:`1.5px solid ${drawTool===t.v?'#F2EDE4':'#4A4540'}`,
              borderRadius:100,padding:'3px 11px',fontSize:11,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',transition:'all 0.1s',whiteSpace:'nowrap'}}>{t.l}</button>
        ))}

        <div style={{width:1,height:18,background:'#4A4540',flexShrink:0}}/>

        {/* Épaisseur — adaptée à l'outil */}
        {(drawTool==='crayon'
          ?[{v:1,l:'Fine'},{v:2,l:'Moy'},{v:4,l:'Épais'}]
          :[{v:10,l:'Fine'},{v:14,l:'Moy'},{v:20,l:'Épais'}]
        ).map(opt=>(
          <button key={opt.v} onClick={()=>setDrawWidth(opt.v)}
            style={{background:drawWidth===opt.v?'#F2EDE4':'transparent',
              color:drawWidth===opt.v?'#1A1A1A':'#A09A90',
              border:`1.5px solid ${drawWidth===opt.v?'#F2EDE4':'#4A4540'}`,
              borderRadius:100,padding:'3px 9px',fontSize:11,fontWeight:700,
              cursor:'pointer',fontFamily:'inherit',transition:'all 0.1s'}}>{opt.l}</button>
        ))}

        <div style={{width:1,height:18,background:'#4A4540',flexShrink:0}}/>

        {/* Couleurs — adaptées à l'outil */}
        {(drawTool==='crayon'
          ?['#F2EDE4','#C0392B','#3A9BD5','#2ECC71','#F39C12']
          :['#FFE033','#FF6EC7','#7DFFB3','#6EC6FF','#FF8C42']
        ).map(col=>(
          <button key={col} onClick={()=>setDrawColor(col)}
            style={{width:20,height:20,
              borderRadius:drawTool==='marqueur'?4:'50%',
              background:col,border:'2px solid transparent',cursor:'pointer',flexShrink:0,
              boxShadow:drawColor===col?`0 0 0 2px #1A1A1A, 0 0 0 4px ${col}`:'none',
              transition:'box-shadow 0.12s'}}/>
        ))}

        <div style={{flex:1}}/>

        <button onClick={undoDraw}
          style={{background:'transparent',border:'1.5px solid #4A4540',borderRadius:100,
            padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#A09A90',fontWeight:600}}>↩</button>

        <button onClick={clearPageDraw}
          style={{background:'transparent',border:'1.5px solid #C0392B',borderRadius:100,
            padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#C0392B',fontWeight:600}}>Effacer</button>

        <button onClick={()=>setDrawMode(false)}
          style={{background:'#F2EDE4',border:'none',borderRadius:100,
            padding:'4px 14px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#1A1A1A',fontWeight:700}}>✕</button>
      </div>
    )}

    {/* BOTTOM BAR — navigation pages + actions */}
    <div style={{background:'rgba(255,255,255,0.92)',backdropFilter:'blur(20px)',WebkitBackdropFilter:'blur(20px)',
      borderTop:'0.5px solid rgba(0,0,0,0.1)',height:BOTTOMBAR_H,
      display:fullscreen?'none':'flex',alignItems:'center',padding:'0 12px',gap:8,flexShrink:0,
      paddingBottom:'env(safe-area-inset-bottom,0px)'}}>
      {/* ↩ Annuler */}
      <button onClick={undo} disabled={undoStack.current.length===0}
        style={{background:'transparent',border:'1.5px solid #D0CAC0',borderRadius:100,
          padding:'4px 10px',fontSize:11,cursor:undoStack.current.length===0?'default':'pointer',
          fontFamily:'inherit',color:undoStack.current.length===0?'#C0BAB0':'#6B6560',fontWeight:600,
          flexShrink:0,opacity:undoStack.current.length===0?0.45:1,transition:'opacity 0.15s'}}>
        ↩ Annuler
      </button>
      <div style={{width:1,height:20,background:'#D0CAC0',flexShrink:0}}/>
      {/* Prev */}
      <button onClick={()=>setCurrentPage(p=>Math.max(0,p-1))} disabled={safePage===0}
        style={{background:'transparent',border:'none',color:safePage===0?'#B0A8A0':'#1A1A1A',
          fontSize:28,fontWeight:700,cursor:safePage===0?'default':'pointer',padding:'0 6px',lineHeight:1,fontFamily:'inherit',opacity:safePage===0?0.4:1}}>
        ‹
      </button>
      {/* Dots */}
      <div style={{flex:1,display:'flex',justifyContent:'center',alignItems:'center',gap:6}}>
        {Array.from({length:totalPages}).map((_,i)=>(
          <button key={i} onClick={()=>setCurrentPage(i)}
            style={{width:safePage===i?20:7,height:7,borderRadius:4,
              background:safePage===i?'#1A1A1A':'#C0BAB0',
              border:'none',cursor:'pointer',padding:0,transition:'all 0.15s'}}/>
        ))}
        {totalPages>1&&(
          <span style={{fontSize:10,color:'#8A847C',marginLeft:4}}>
            {safePage+1}/{totalPages}
          </span>
        )}
      </div>
      {/* Next */}
      <button onClick={()=>setCurrentPage(p=>Math.min(totalPages-1,p+1))} disabled={safePage===totalPages-1}
        style={{background:'transparent',border:'none',color:safePage===totalPages-1?'#B0A8A0':'#1A1A1A',
          fontSize:28,fontWeight:700,cursor:safePage===totalPages-1?'default':'pointer',padding:'0 6px',lineHeight:1,fontFamily:'inherit',opacity:safePage===totalPages-1?0.4:1}}>
        ›
      </button>
      {editMode&&<>
        <div style={{width:1,height:20,background:'#D0CAC0',flexShrink:0}}/>
        {/* + Section */}
        <button onClick={()=>setInsertSheet(cur.sections.length)}
          style={{background:'transparent',border:'1.5px solid #D0CAC0',borderRadius:100,
            padding:'4px 11px',fontSize:11,cursor:'pointer',fontFamily:'inherit',
            color:'#6B6560',fontWeight:600,display:'flex',alignItems:'center',gap:3}}>
          <span style={{fontSize:14,lineHeight:1}}>+</span><span>Section</span>
        </button>
      </>}
    </div>
  </div>);
}

// ─── APP ──────────────────────────────────────────────────────────────────────
function App(){
  const [view,setView]=useState('home');
  const [library,setLibrary]=useState(LIBRARY_INIT);
  const [pieceId,setPieceId]=useState(1);
  const [displayKey,setDisplayKey]=useState('Bb');
  const [displayMode,setDisplayMode]=useState('maj');
  const [prefs,setPrefs]=useState(loadPrefs);
  function updatePrefs(p){setPrefs(p);savePrefs(p);}
  const piece=library.find(p=>p.id===pieceId)||library[0];
  function selectPiece(p){setPieceId(p.id);setDisplayKey(p.key);setView('editor');}
  function createPiece(){
    const newId=Date.now();
    const newPiece={id:newId,title:'Nouveau morceau',key:'C',bpm:120,style:'',timeSig:'4/4',
      sections:[{name:'A',type:'grid',startBar:'normal',
        measures:[mk(['C']),mk(['C']),mk(['C']),mk(['C'])]}]};
    setLibrary(lib=>[...lib,newPiece]);
    setPieceId(newId);setDisplayKey('C');setView('editor');
  }
  if(view==='home')    return <HomeScreen    onNavigate={v=>setView(v)}/>;
  if(view==='library') return <LibraryScreen library={library} activePieceId={pieceId} onSelect={selectPiece} onBack={()=>setView('home')} onCreate={createPiece}/>;
  if(view==='prefs')   return <PreferencesScreen prefs={prefs} onUpdate={updatePrefs} onBack={()=>setView('home')}/>;
  if(view==='editor')  return <EditorScreen  library={library} setLibrary={setLibrary} piece={piece} displayKey={displayKey} setDisplayKey={setDisplayKey} displayMode={displayMode} setDisplayMode={setDisplayMode} onBack={()=>setView('library')} prefs={prefs}/>;
  return null;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
  if('serviceWorker' in navigator){
    // Forcer la mise à jour du SW au chargement
    navigator.serviceWorker.getRegistrations().then(regs=>{
      regs.forEach(r=>r.update());
    });
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('./sw.js').then(reg=>{
        reg.update();
      }).catch(()=>{});
    });
  }
</script>
</body>
</html>
